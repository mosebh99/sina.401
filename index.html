<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينا ستور 401</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; margin: 0; padding: 0; color: #f3f4f6; }
        nav { background: #141414; color: #ffffff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4af37; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: relative; }
        nav h1 { margin: 0; font-size: 22px; font-weight: bold; color: #d4af37; display: flex; align-items: center; gap: 10px; }
        nav h1 span { font-size: 12px; color: #a3a3a3; font-weight: normal; display: block; margin-top: 2px; }
        .nav-right { display: flex; align-items: center; gap: 15px; position: relative; }
        .auth-status-btn { background: #262626; color: #d4af37; border: 1px solid #d4af37; padding: 8px 14px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .auth-status-btn:hover { background: #d4af37; color: black; }
        .menu-dots-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #d4af37; padding: 0 10px; font-weight: bold; line-height: 1; }
        .dropdown-menu { display: none; position: absolute; left: 0; top: 45px; background: #1a1a1a; border: 1px solid #d4af37; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 100; min-width: 180px; overflow: hidden; }
        .dropdown-menu button { display: block; width: 100%; padding: 12px 15px; color: white; text-decoration: none; background: none; border: none; text-align: right; font-size: 14px; font-family: inherit; cursor: pointer; box-sizing: border-box; border-bottom: 1px solid #2a2a2a; transition: 0.2s; }
        .dropdown-menu button:hover { background: #d4af37; color: black; }
        .categories-container { max-width: 1300px; margin: 25px auto 0 auto; padding: 0 20px; box-sizing: border-box; }
        .categories-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
        .cat-btn { background: #1a1a1a; color: #d4d4d4; padding: 8px 18px; border-radius: 20px; border: 1px solid #404040; cursor: pointer; white-space: nowrap; font-weight: 600; font-size: 13px; transition: 0.2s; }
        .cat-btn.active { background: #d4af37; color: black; border-color: #d4af37; }
        .main-container { max-width: 1300px; margin: 15px auto 25px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 25px; box-sizing: border-box; }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
        .search-box { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #404040; border-radius: 8px; color: white; font-size: 14px; margin-bottom: 25px; box-sizing: border-box; text-align: right; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; }
        .product-card:hover { border-color: #d4af37; transform: translateY(-4px); }
        .product-img { width: 100%; height: 190px; object-fit: cover; background: #0d0d0d; border-bottom: 1px solid #2a2a2a; }
        .product-info { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { font-size: 16px; font-weight: bold; margin: 0 0 8px 0; color: white; }
        .price-badge-mini { color: #d4af37; font-weight: bold; font-size: 15px; margin-bottom: 6px; background: rgba(212, 175, 55, 0.1); width: fit-content; padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .stock-count { font-size: 12px; color: #a3a3a3; margin-bottom: 12px; }
        .action-card-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; background: #d4af37; color: black; }
        .order-card { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #2a2a2a; border-top: 5px solid #d4af37; height: fit-content; position: sticky; top: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 6px; color: #d4d4d4; }
        .form-group input, .form-group select { width: 100%; padding: 11px; background: #0d0d0d; border: 1px solid #404040; border-radius: 6px; color: white; text-align: right; box-sizing: border-box; }
        .btn-yellow-submit { width: 100%; padding: 12px; background: #d4af37; color: black; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 12px; width: 100%; max-width: 600px; padding: 25px; position: relative; box-sizing: border-box; }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 28px; color: #a3a3a3; cursor: pointer; background: none; border: none; }
        .modal-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; }
        .modal-order-btn { width: 100%; padding: 12px; background: #d4af37; color: black; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .similar-section { margin-top: 25px; border-top: 1px solid #2a2a2a; padding-top: 20px; }
        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 10px; }
        .similar-card { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; }
        .similar-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .similar-card h4 { font-size: 12px; margin: 6px 0 3px 0; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .similar-card span { font-size: 11px; color: #d4af37; font-weight: bold; }
        .no-img-placeholder { height: 190px; background: #0d0d0d; display: flex; align-items: center; justify-content: center; color: #404040; font-size: 40px; border-bottom: 1px solid #2a2a2a; }
    </style>
</head>
<body>
    <nav>
        <h1>🦅 سينا ستور 401 <span>المتجر الرئيسي</span></h1>
        <div class="nav-right">
            <button id="auth-toggle-btn" onclick="toggleAuthMock()" class="auth-status-btn">🔐 حساب سريع لتذكر بياناتك</button>
            <button onclick="toggleMenu(event)" class="menu-dots-btn">⋮</button>
            <div id="more-dropdown" class="dropdown-menu">
                <button onclick="goToPage('marketers.html')">👥 بوابة المسوقين</button>
                <button onclick="goToPage('cashier.html')">🖥️ الكاشير والإدارة</button>
            </div>
        </div>
    </nav>

    <div class="categories-container">
        <div class="categories-bar" id="categories-wrapper"></div>
    </div>

    <div class="main-container">
        <div>
            <input type="text" id="search-input" class="search-box" placeholder="🔍 ابحث عن منتج داخل المتجر...">
            <h2 style="color: #d4af37; margin-top: 0;">🛒 المنتجات المتاحة للطلب السريع</h2>
            <div class="products-grid" id="products-container"></div>
        </div>
        <div>
            <div class="order-card" id="sidebar-order-card">
                <h2>🛍️ نموذج الشراء الفوري (الدفع عند الاستلام)</h2>
                <form id="customer-order-form" onsubmit="submitCustomerOrder(event)">
                    <div class="form-group">
                        <label>المنتج المطلوب شراءه:</label>
                        <select id="customer-product-select" required></select>
                    </div>
                    <div class="form-group"><label>الكمية:</label><input type="number" id="customer-qty" value="1" min="1" required></div>
                    <div class="form-group"><label>اسمك الكامل:</label><input type="text" id="cust-name" required placeholder="الاسم ثلاثي"></div>
                    <div class="form-group"><label>رقم التليفون:</label><input type="text" id="cust-phone" required placeholder="رقم موبايل نشط شغال"></div>
                    <div class="form-group"><label>عنوان شحن الطلب بالتفصيل:</label><input type="text" id="cust-address" required placeholder="المحافظة / المدينة / اسم الشارع"></div>
                    <button type="submit" class="btn-yellow-submit">📦 تأكيد طلب الشراء في السيستم</button>
                </form>
            </div>
        </div>
    </div>

    <div id="product-modal" class="modal" onclick="closeProductModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="document.getElementById('product-modal').style.display='none'">&times;</button>
            <div id="modal-body-content"></div>
            <div id="modal-order-action-container"></div>
            <div class="similar-section">
                <h3 style="font-size: 13px; color:#d4af37; margin: 0 0 10px 0;">📦 منتجات قد تعجبك أيضاً في هذا القسم:</h3>
                <div class="similar-grid" id="similar-products-wrapper"></div>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = localStorage.getItem('user_logged_in') === 'true';
        let selectedCategory = "الكل";
        let products = [];

        function toggleMenu(e) { e.stopPropagation(); const d = document.getElementById('more-dropdown'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        document.addEventListener('click', () => { document.getElementById('more-dropdown').style.display = 'none'; });

        function toggleAuthMock() { isLoggedIn = !isLoggedIn; localStorage.setItem('user_logged_in', isLoggedIn); updateAuthUI(); renderStore(); }
        function updateAuthUI() {
            const btn = document.getElementById('auth-toggle-btn');
            if (isLoggedIn) {
                btn.innerText = "🔓 تم تفعيل الحساب التلقائي الذكي"; btn.style.color = "#22c55e"; btn.style.borderColor = "#22c55e";
                document.getElementById('cust-name').value = localStorage.getItem('cached_cust_name') || '';
                document.getElementById('cust-phone').value = localStorage.getItem('cached_cust_phone') || '';
                document.getElementById('cust-address').value = localStorage.getItem('cached_cust_address') || '';
            } else { btn.innerText = "🔐 حساب سريع لتذكر بياناتك"; btn.style.color = "#d4af37"; btn.style.borderColor = "#d4af37"; }
        }

        function goToPage(p) { window.location.href = window.location.origin + window.location.pathname.replace('index.html', '') + p; }

        // دالة جلب البيانات السحابية من الـ API
        function fetchCloudData() {
            fetch('/api/products')
            .then(res => res.json())
            .then(data => {
                products = data;
                // مزامنة الكاش المحلي مع السحابي
                localStorage.setItem('sinai_products', JSON.stringify(products));
                renderCategoriesBar();
                renderStore();
            })
            .catch(err => {
                console.log("استدعاء الكاش الاحتياطي المحلي نتيجة لعدم اكتمال السيرفر حالياً:", err);
                products = JSON.parse(localStorage.getItem('sinai_products')) || [];
                renderCategoriesBar();
                renderStore();
            });
        }

        function renderCategoriesBar() {
            const w = document.getElementById('categories-wrapper'); let cats = ["الكل"];
            products.forEach(p => { if(p.category && !cats.includes(p.category)) cats.push(p.category); });
            w.innerHTML = '';
            cats.forEach(c => { const act = selectedCategory === c ? 'active' : ''; w.innerHTML += `<button class="cat-btn ${act}" onclick="filterByCategory('${c}')">${c}</button>`; });
        }
        function filterByCategory(c) { selectedCategory = c; renderCategoriesBar(); renderStore(); }

        function renderStore() {
            const container = document.getElementById('products-container'); const select = document.getElementById('customer-product-select');
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            container.innerHTML = ''; select.innerHTML = '<option value="">-- اضغط واختر المنتج المطلوب شراءه --</option>';

            let filtered = products.filter(p => p.name.toLowerCase().includes(query) && (selectedCategory === "الكل" || p.category === selectedCategory));
            products.forEach(p => { if(p.stock_quantity > 0) select.innerHTML += `<option value="${p.id}">${p.name} - ${p.selling_price} ج.م</option>'; });

            if(filtered.length === 0) { container.innerHTML = '<p style="color:#a3a3a3;text-align:center;grid-column:1/-1;">لا توجد منتجات متوفرة حالياً.</p>'; return; }
            filtered.forEach(p => {
                let img = p.image_url ? `<img src="${p.image_url}" class="product-img">` : `<div class="no-img-placeholder">🌴</div>`;
                let btn = p.stock_quantity > 0 ? `<button class="action-card-btn" onclick="selectProductForForm(event, ${p.id})">📦 اطلب الآن فوري</button>` : '';
                container.innerHTML += `
                    <div class="product-card" style="${p.stock_quantity<=0?'opacity:0.4;':''}" onclick="openProductDetail(${p.id})">
                        ${img}
                        <div class="product-info">
                            <h3 class="product-title">${p.name}</h3>
                            <div>
                                <div class="price-badge-mini">${p.selling_price} ج.م</div>
                                <div class="stock-count">${p.stock_quantity<=0?'❌ نفذت':'🟢 متوفر'}</div>
                                ${btn}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function selectProductForForm(e, id) { if(e) e.stopPropagation(); document.getElementById('customer-product-select').value = id; document.getElementById('sidebar-order-card').scrollIntoView({ behavior: 'smooth' }); }
        
        function openProductDetail(id) {
            const p = products.find(x => x.id === id); if(!p) return;
            let img = p.image_url ? `<img src="${p.image_url}" class="modal-img">` : `<div class="no-img-placeholder" style="height:240px;">🌴</div>`;
            document.getElementById('modal-body-content').innerHTML = img + `<h2>${p.name}</h2><div class="price-badge-mini">${p.selling_price} ج.م</div><p style="color:#d4d4d4;background:#0d0d0d;padding:15px;border-radius:8px;">${p.description||'منتج طبيعي مميز من أرض سيناء.'}</p>`;
            document.getElementById('modal-order-action-container').innerHTML = p.stock_quantity > 0 ? `<button class="modal-order-btn" onclick="orderFromModal(${p.id})">📦 اطلب الآن فوري</button>` : '';
            
            let sim = products.filter(x => x.category === p.category && x.id !== p.id && x.stock_quantity > 0).slice(0, 4);
            const sw = document.getElementById('similar-products-wrapper'); sw.innerHTML = sim.length===0?'<p style="color:#a3a3a3;font-size:12px;">لا توجد منتجات مشابهة.</p>':'';
            sim.forEach(s => { sw.innerHTML += `<div class="similar-card" onclick="switchModalProduct(${s.id})"><img src="${s.image_url||''}"><h4>${s.name}</h4><span>${s.selling_price} ج.م</span></div>`; });
            document.getElementById('product-modal').style.display = "flex";
        }

        function orderFromModal(id) { document.getElementById('product-modal').style.display = 'none'; selectProductForForm(null, id); }
        function switchModalProduct(id) { document.getElementById('product-modal').style.display = 'none'; setTimeout(() => { openProductDetail(id); }, 150); }
        function closeProductModal(e) { if(e.target.id === "product-modal") document.getElementById('product-modal').style.display = 'none'; }

        function submitCustomerOrder(e) {
            e.preventDefault(); const id = parseInt(document.getElementById('customer-product-select').value); const qty = parseInt(document.getElementById('customer-qty').value);
            const name = document.getElementById('cust-name').value.trim(); const phone = document.getElementById('cust-phone').value.trim(); const address = document.getElementById('cust-address').value.trim();
            if(!id) return; let p = products.find(x => x.id === id);
            localStorage.setItem('cached_cust_name', name); localStorage.setItem('cached_cust_phone', phone); localStorage.setItem('cached_cust_address', address); localStorage.setItem('user_logged_in', 'true');
            
            fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ product_id: id, product_name: p.name, quantity: qty, total: p.selling_price*qty, customer_name: name, customer_phone: phone, customer_address: address }) })
            .then(() => { alert(`🎉 تم إرسال طلبك السحابي بنجاح! الإجمالي: ${p.selling_price*qty} ج.م`); document.getElementById('customer-order-form').reset(); isLoggedIn=true; updateAuthUI(); })
            .catch(() => { alert(`🎉 تم حفظ الطلب كاش بالسيستم المحلي بنجاح! الإجمالي: ${p.selling_price*qty} ج.م`); });
        }

        document.getElementById('search-input').addEventListener('input', renderStore);
        updateAuthUI(); 
        fetchCloudData(); // استدعاء البيانات السحابية مباشرة عند التحميل
    </script>
</body>
</html>
