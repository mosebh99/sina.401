<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينا ستور | المنتجات الطبيعية</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --primary: #d4af37;
            --bg: #0d0d0d;
            --card-bg: #141414;
            --text: #ffffff;
            --text-muted: #a3a3a3;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 24px;
        }
        header .admin-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 6px;
            transition: 0.2s;
        }
        header .admin-link:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #1a1a1a;
        }
        .product-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-details h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary);
        }
        .product-details .description {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0 0 15px 0;
            flex-grow: 1;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .price {
            font-size: 18px;
            font-weight: bold;
            color: #22c55e;
        }
        .add-to-cart-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: 0.2s;
        }
        .add-to-cart-btn:hover {
            background: #bfa030;
        }
        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌿 متجر سينا ستور (Sina Store)</h1>
        <a href="/cashier.html" class="admin-link">👑 لوحة التحكم والإدارة</a>
    </header>

    <div class="products-grid" id="products-container">
        <p style="color: var(--text-muted); text-align: center; grid-column: 1/-1;">جاري الاتصال بالسيرفر وجلب المنتجات الحية...</p>
    </div>

    <script>
        // 🛠️ دالة جلب المنتجات الحية من السيرفر السحابي وقاعدة البيانات
        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const cloudProducts = await response.json();
                
                const productsContainer = document.getElementById('products-container'); 
                if (!productsContainer) return;
                
                productsContainer.innerHTML = ''; // تنظيف الكاردات القديمة أو التجريبية تماماً

                if (cloudProducts.length === 0) {
                    productsContainer.innerHTML = '<p class="no-products">انتظروا منتجاتنا المميزة قريباً في سينا ستور!</p>';
                    return;
                }

                // رسم المنتجات الديناميكية القادمة من السيرفر
                cloudProducts.forEach(product => {
                    productsContainer.innerHTML += `
                        <div class="product-card">
                            <img src="${product.image_url}" alt="${product.name}" onerror="this.src='logo.png'">
                            <div class="product-details">
                                <h3>${product.name}</h3>
                                <p class="description">${product.description}</p>
                                <div class="price-row">
                                    <span class="price">${product.selling_price} ج.م</span>
                                    <button onclick="addToCart(${product.id}, '${product.name}', ${product.selling_price})" class="add-to-cart-btn">🛒 إضافة للسلة</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("خطأ في جلب المنتجات من السيرفر:", error);
                document.getElementById('products-container').innerHTML = '<p class="no-products" style="color: red;">⚠️ فشل الاتصال بالسيرفر السحابي، تأكد من تشغيل app.py</p>';
            }
        }

        // دالة إضافة منتج للسلة (تتكامل تلقائياً مع نظام الشراء والمبيعات)
        function addToCart(id, name, price) {
            alert(`👍 تم إضافة ${name} إلى سلة المشتريات بنجاح!`);
        }

        // تشغيل الجلب التلقائي فور تحميل واجهة الزبون
        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
