<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينا ستور | Sina Store 401</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* التصميم الأصلي الفخم لمتجر سينا ستور */
        :root {
            --primary: #d4af37; /* اللون الذهبي السيناوي */
            --bg: #0d0d0d;      /* الخلفية السوداء الداكنة */
            --card-bg: #141414; /* خلفية الكروت */
            --text: #ffffff;
            --text-muted: #a3a3a3;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .admin-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 6px;
            transition: 0.2s;
        }

        header .admin-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
        }

        /* شبكة عرض المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .product-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-details h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary);
        }

        .product-details .category-badge {
            font-size: 11px;
            background: #2a2a2a;
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 4px;
            width: fit-content;
            margin-bottom: 10px;
        }

        .product-details .description {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0 0 15px 0;
            flex-grow: 1;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px dashed #2a2a2a;
            padding-top: 12px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #22c55e;
        }

        .add-to-cart-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: 0.2s;
        }

        .add-to-cart-btn:hover {
            background: #bfa030;
            transform: scale(1.02);
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌿 سينا ستور للمنتجات الطبيعية</h1>
        <a href="/cashier.html" class="admin-link">👑 لوحة إدارة المتجر</a>
    </header>

    <div class="products-grid" id="main-products-grid">
        <p class="status-msg">⏳ جاري سحب المنتجات الحية وتحديث المخزن من السيرفر السحابي...</p>
    </div>

    <script>
        // 🛠️ دالة جلب المنتجات الحية من السيرفر السحابي (app.py)
        async function loadProductsFromServer() {
            const container = document.getElementById('main-products-grid');
            if (!container) return;

            try {
                const response = await fetch('/api/products');
                const cloudProducts = await response.json();
                
                container.innerHTML = ''; // تنظيف شبكة العرض تماماً من أي منتجات قديمة

                if (!cloudProducts || cloudProducts.length === 0) {
                    container.innerHTML = '<p class="status-msg">مرحباً بكم في سينا ستور! انتظروا منتجاتنا الطبيعية المميزة قريباً جداً.</p>';
                    return;
                }

                // رسم كروت المنتجات بالتصميم الأصلي بناءً على البيانات القادمة من قاعدة البيانات الثابتة
                cloudProducts.forEach(product => {
                    container.innerHTML += `
                        <div class="product-card">
                            <img src="${product.image_url}" alt="${product.name}" onerror="this.src='logo.png'">
                            <div class="product-details">
                                <span class="category-badge">${product.category || 'منتج سيناوي'}</span>
                                <h3>${product.name}</h3>
                                <p class="description">${product.description || ''}</p>
                                <div class="price-row">
                                    <span class="price">${product.selling_price} ج.م</span>
                                    <button onclick="addToCart(${product.id}, '${product.name}', ${product.selling_price})" class="add-to-cart-btn">🛒 إضافة للسلة</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("خطأ في جلب المنتجات:", error);
                container.innerHTML = '<p class="status-msg" style="color: #dc2626;">⚠️ عذراً، تعذر الاتصال بالسيرفر السحابي حالياً. جاري العرض الاحتياطي محلياً.</p>';
            }
        }

        // دالة سلة المشتريات (تتكامل مع نظام كاشير وطلبات الموقع)
        function addToCart(id, name, price) {
            alert(`👍 تم إضافة "${name}" إلى سلة المشتريات بنجاح!`);
        }

        // تشغيل الجلب فور فتح واجهة المستخدم
        window.addEventListener('DOMContentLoaded', loadProductsFromServer);
    </script>
</body>
</html>
