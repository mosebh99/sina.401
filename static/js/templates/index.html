<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sina 401 | متجر سينا لملحقات الموبايل</title>
    <meta name="description" content="تصفح واشترِ أحدث إكسسوارات وملحقات الهواتف المحمولة بجودة عالية وضمان حصري من سينا ستور.">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="toast" id="toast-notification"></div>

    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div class="nav-links">
            <a href="/">الرئيسية</a>
            <a href="/marketers.html">بوابة المسوقين</a>
            <a href="/login.html">🔐 لوحة الإدارة</a>
            <span style="color: var(--primary);">🛒 السلة (<span id="cart-count">0</span>)</span>
        </div>
    </header>

    <div class="hero-banner">
        <h2>👑 الفخامة والتميز في مكان واحد</h2>
        <p>اكتشف أقوى العروض والملحقات بضمان سينا ستور الأصلي</p>
    </div>

    <div class="controls-row">
        <input type="text" id="search-box" class="search-input" placeholder="ابحث عن منتجك المفضل..." oninput="handleSearchAndFilter()">
        
        <select id="filter-category" class="filter-select" onchange="handleSearchAndFilter()">
            <option value="الكل">كل الأقسام</option>
            <option value="عام">عام وإلكترونيات</option>
            <option value="زيوت طبيعية">زيوت طبيعية</option>
            <option value="أعشاب طبيعية">أعشاب طبيعية</option>
        </select>

        <select id="sort-select" class="filter-select" onchange="handleSearchAndFilter()">
            <option value="default">الترتيب الافتراضي</option>
            <option value="price-low">السعر: من الأقل للأعلى</option>
            <option value="price-high">السعر: من الأعلى للأقل</option>
        </select>
    </div>

    <div class="products-grid" id="products-container">
        <p style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">جاري تحميل المنتجات...</p>
    </div>

    <div style="max-width: 500px; margin: 40px auto; padding: 20px; background:var(--card-bg); border-radius:12px; border:1px solid #222;">
        <h3 style="color:var(--primary); text-align:center; margin-top:0;">📦 تتبع حالة شحنتك فوراً</h3>
        <div style="display:flex; gap:10px;">
            <input type="tel" id="track-phone" class="search-input" style="flex:1;" placeholder="رقم الهاتف المسجل بالطلب...">
            <button class="btn-primary" style="width:auto; margin:0; padding:0 20px;" onclick="trackMyOrder()">تتبع</button>
        </div>
        <div id="track-output" style="margin-top:15px; text-align:center;"></div>
    </div>

    <a href="https://wa.me/201065653401" class="floating-whatsapp" target="_blank">💬</a>

    <script src="/static/js/store.js"></script>
</body>
</html>
