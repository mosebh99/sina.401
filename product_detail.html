<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض تفاصيل المنتج | Sina 401</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .details-container { max-width: 1000px; margin: 40px auto; padding: 20px; display: flex; gap: 40px; flex-wrap: wrap; }
        .gallery-box { flex: 1; min-width: 300px; }
        .info-box { flex: 1; min-width: 300px; }
        .main-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; border: 1px solid var(--primary); background: #000; cursor: zoom-in; transition: transform 0.3s; }
        .main-img:hover { transform: scale(1.02); }
        .thumbnails { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .thumbnails img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .thumbnails img.active, .thumbnails img:hover { border-color: var(--primary); }

        .product-title { color: var(--primary); margin-top: 0; font-size: 28px; }
        .product-category { color: var(--text-muted); font-size: 14px; margin-bottom: 15px; }
        .product-desc { line-height: 1.8; color: #ccc; white-space: pre-line; margin: 20px 0; padding: 15px; background: #111; border-radius: 8px; }
        .product-price { font-size: 32px; color: var(--primary); font-weight: bold; margin: 20px 0; }
        .product-stock { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 13px; margin-bottom: 20px; }
        .stock-available { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .stock-low { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .stock-out { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .action-btns { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .action-btns button { flex: 1; min-width: 150px; }

        .related-products { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .related-products h3 { color: var(--primary); margin-bottom: 20px; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

        .breadcrumb { max-width: 1000px; margin: 20px auto; padding: 0 20px; color: var(--text-muted); font-size: 13px; }
        .breadcrumb a { color: var(--primary); }
        .breadcrumb a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div class="nav-links"><a href="/">⬅️ العودة للمتجر</a></div>
    </header>

    <div class="breadcrumb">
        <a href="/">🏠 الرئيسية</a> / <span id="breadcrumb-product">جاري التحميل...</span>
    </div>

    <div class="details-container" id="product-detail-view">
        <p style="text-align:center; width:100%; color:var(--text-muted);">⏳ جاري جلب تفاصيل المنتج...</p>
    </div>

    <div class="related-products" id="related-section" style="display: none;">
        <h3>🎯 منتجات مشابهة قد تعجبك</h3>
        <div class="related-grid" id="related-grid"></div>
    </div>

    <a href="https://wa.me/201065653401" class="floating-whatsapp" target="_blank">💬</a>

    <script>
        let cart = JSON.parse(localStorage.getItem('sina_store_cart')) || [];

        async function loadProductDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if(!productId) { window.location.href = '/'; return; }

            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const p = products.find(prod => prod.id == productId);

                if(!p) {
                    document.getElementById('product-detail-view').innerHTML = `
                        <div style="text-align:center; width:100%; padding:40px;">
                            <p style="color:#ef4444; font-size:24px;">❌ المنتج غير موجود</p>
                            <a href="/" style="color:var(--primary); margin-top:15px; display:inline-block;">العودة للمتجر</a>
                        </div>
                    `;
                    return;
                }

                // تحديث breadcrumb
                document.getElementById('breadcrumb-product').innerText = p.name;

                // تحديد حالة المخزون
                let stockClass = 'stock-available';
                let stockText = `✅ متوفر: ${p.stock_quantity || 0} قطعة`;
                if ((p.stock_quantity || 0) <= 5 && (p.stock_quantity || 0) > 0) {
                    stockClass = 'stock-low';
                    stockText = `⚠️ باقي قليل: ${p.stock_quantity} قطعة`;
                } else if ((p.stock_quantity || 0) === 0) {
                    stockClass = 'stock-out';
                    stockText = '❌ نفذت الكمية';
                }

                // الصور الإضافية
                let extraImagesHtml = '';
                let thumbnailsHtml = '';
                if (p.extra_images) {
                    try {
                        let arr = typeof p.extra_images === 'string' ? JSON.parse(p.extra_images) : p.extra_images;
                        if (Array.isArray(arr) && arr.length > 0) {
                            thumbnailsHtml = arr.map((url, i) => 
                                `<img src="${url}" onclick="changeMainImage('${url}')" class="${i === 0 ? 'active' : ''}" alt="صورة ${i + 1}">`
                            ).join('');
                        }
                    } catch(e) {}
                }

                document.getElementById('product-detail-view').innerHTML = `
                    <div class="gallery-box">
                        <img id="large-img" src="${p.image_url || '/static/css/logo.png.jpeg'}" class="main-img" onerror="this.src='/static/css/logo.png.jpeg'" onclick="window.open(this.src, '_blank')">
                        <div class="thumbnails">
                            <img src="${p.image_url || '/static/css/logo.png.jpeg'}" onclick="changeMainImage('${p.image_url || '/static/css/logo.png.jpeg'}')" class="active" alt="الصورة الرئيسية">
                            ${thumbnailsHtml}
                        </div>
                    </div>
                    <div class="info-box">
                        <h2 class="product-title">${p.name}</h2>
                        <p class="product-category">🏷️ الفئة: ${p.category || 'عام'}</p>
                        <span class="product-stock ${stockClass}">${stockText}</span>
                        <p class="product-desc">${p.description || 'لا توجد تفاصيل إضافية لهذا المنتج.'}</p>
                        <div class="product-price">${p.selling_price || 0} ج.م</div>
                        <div class="action-btns">
                            <button class="btn-primary" onclick="window.open('https://wa.me/201065653401?text=أريد طلب منتج: ${encodeURIComponent(p.name)}', '_blank')" style="background:#25d366; color:white;">
                                💬 طلب عبر واتساب
                            </button>
                            <button class="btn-primary" onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\'")}', ${p.selling_price})">
                                🛒 أضف للسلة
                            </button>
                        </div>
                    </div>
                `;

                // تحميل منتجات مشابهة
                loadRelatedProducts(products, p);

            } catch(e) {
                document.getElementById('product-detail-view').innerHTML = `
                    <div style="text-align:center; width:100%; padding:40px;">
                        <p style="color:#ef4444;">❌ خطأ في جلب البيانات</p>
                        <button onclick="location.reload()" style="background:var(--primary-gradient); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin-top:15px;">🔄 إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        function changeMainImage(url) {
            document.getElementById('large-img').src = url;
            document.querySelectorAll('.thumbnails img').forEach(img => img.classList.remove('active'));
            event.target.classList.add('active');
        }

        function loadRelatedProducts(allProducts, currentProduct) {
            const related = allProducts
                .filter(prod => prod.id !== currentProduct.id && prod.category === currentProduct.category)
                .slice(0, 4);

            if (related.length === 0) return;

            document.getElementById('related-section').style.display = 'block';
            const grid = document.getElementById('related-grid');
            grid.innerHTML = '';

            related.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card" style="background:#141414; border:1px solid var(--card-border); border-radius:12px; overflow:hidden; cursor:pointer;" onclick="window.location.href='/product_detail.html?id=${p.id}'">
                        <img src="${p.image_url || '/static/css/logo.png.jpeg'}" style="width:100%; height:150px; object-fit:cover;" onerror="this.src='/static/css/logo.png.jpeg'">
                        <div style="padding:12px;">
                            <h4 style="margin:0 0 8px 0; font-size:14px; color:#fff;">${p.name}</h4>
                            <div style="color:var(--primary); font-weight:bold;">${p.selling_price} ج.م</div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if(existing) {
                existing.qty += 1;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            localStorage.setItem('sina_store_cart', JSON.stringify(cart));

            // إشعار
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed; top:20px; left:20px; background:#141414; border-right:4px solid var(--primary); padding:15px 25px; border-radius:8px; z-index:9999; animation:slideIn 0.3s;';
            toast.innerHTML = `✅ تم إضافة "${name}" للسلة`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.addEventListener('DOMContentLoaded', loadProductDetail);
    </script>
</body>
</html>
