<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المسوقين | سينا ستور</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links a {
            color: #888;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .nav-links a:hover { color: #d4af37; }
        .login-container {
            max-width: 420px;
            margin: 60px auto;
            padding: 40px 30px;
            background: #161616;
            border-radius: 16px;
            border: 1px solid rgba(212,175,55,0.15);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 90%;
        }
        .login-container h2 {
            color: #d4af37;
            margin-top: 0;
            font-size: 24px;
        }
        .login-container p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #111;
            border: 1px solid #222;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212,175,55,0.15);
        }
        .input-group label {
            display: block;
            text-align: right;
            margin-bottom: 6px;
            color: #888;
            font-size: 13px;
        }
        .login-btn {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-family: inherit;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(212,175,55,0.4);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            transition: color 0.3s;
            text-decoration: none;
        }
        .back-link:hover { color: #d4af37; }
    </style>
</head>
<body>
    <header>
        <div class="logo">✨ سينا ستور</div>
        <div class="nav-links"><a href="/">⬅️ العودة للمتجر</a></div>
    </header>

    <div class="login-container">
        <h2>📊 بوابة المسوقين</h2>
        <p>أدخل كود المسوق وكلمة المرور للوصول لحسابك</p>

        <form id="marketer-login-form" class="login-form">
            <div class="input-group">
                <label>كود المسوق</label>
                <input type="text" id="mk-code" placeholder="أدخل كود المسوق..." required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="mk-pass" placeholder="أدخل كلمة المرور..." required>
            </div>
            <button type="submit" class="login-btn" id="login-btn">تسجيل الدخول</button>
            <div class="error-msg" id="error-msg"></div>
        </form>

        <a href="/" class="back-link">⬅️ العودة للمتجر الرئيسي</a>
    </div>

    <script>
        async function checkLoginStatus() {
            try {
                const res = await fetch('/api/marketer/check');
                const data = await res.json();
                if (data.authenticated) {
                    window.location.href = '/marketer_dashboard.html';
                }
            } catch (e) {}
        }
        checkLoginStatus();

        document.getElementById('marketer-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const code = document.getElementById('mk-code').value.trim();
            const pass = document.getElementById('mk-pass').value.trim();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'جاري التحقق...';

            try {
                const res = await fetch('/api/marketer/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, password: pass })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/marketer_dashboard.html';
                } else {
                    errorDiv.innerText = '❌ ' + (data.message || 'بيانات الدخول غير صحيحة');
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'تسجيل الدخول';
                }
            } catch (err) {
                errorDiv.innerText = '❌ فشل الاتصال بالسيرفر';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'تسجيل الدخول';
            }
        });
    </script>
</body>
</html>
