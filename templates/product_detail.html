<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | سينا ستور</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: #f8f9fa;
            color: #333;
            direction: rtl;
        }
        .header {
            background: #2c2c2c;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: white;
        }
        .logo span { color: #e67e22; }
        .back-btn {
            background: #e67e22;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .product-detail {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
        }
        .product-gallery {
            flex: 1;
            min-width: 300px;
            padding: 20px;
        }
        .main-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 12px;
        }
        .product-info {
            flex: 1;
            min-width: 300px;
            padding: 30px;
        }
        .product-name {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2c2c2c;
        }
        .product-category {
            color: #888;
            margin-bottom: 15px;
        }
        .product-price {
            font-size: 32px;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .product-stock {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .in-stock { background: #22c55e20; color: #22c55e; }
        .product-desc {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .product-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .product-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-whatsapp {
            background: #25d366;
            color: white;
        }
        .btn-cart {
            background: #e67e22;
            color: white;
        }
        .order-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }
        .order-form h3 {
            margin-bottom: 15px;
            color: #2c2c2c;
        }
        .order-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }
        .order-form button {
            width: 100%;
            padding: 12px;
            background: #2c2c2c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c2c2c;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            display: none;
        }
        @media (max-width: 768px) {
            .product-detail { flex-direction: column; }
            .main-img { height: 250px; }
            .product-name { font-size: 22px; }
            .product-price { font-size: 24px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">سينا <span>ستور</span></div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
    </header>

    <div class="container">
        <div class="product-detail" id="productDetail">
            <div style="text-align: center; padding: 50px; width: 100%;">جاري تحميل المنتج...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const productId = new URLSearchParams(window.location.search).get('id');
        let currentProduct = null;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('sina_cart') || '[]');
            const existing = cart.find(item => item.id === currentProduct.id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    price: currentProduct.selling_price,
                    qty: 1,
                    image: currentProduct.image_url
                });
            }
            localStorage.setItem('sina_cart', JSON.stringify(cart));
            showToast('✅ تم إضافة المنتج إلى السلة');
        }

        async function submitDirectOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();

            if (!name || !phone || !address) {
                showToast('❌ يرجى ملء جميع الحقول');
                return;
            }

            const btn = document.querySelector('.order-form button');
            btn.disabled = true;
            btn.innerText = 'جاري الإرسال...';

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_name: name,
                        customer_phone: phone,
                        customer_address: address,
                        total_price: currentProduct.selling_price,
                        products: [{ id: currentProduct.id, name: currentProduct.name, price: currentProduct.selling_price, qty: 1 }],
                        marketer_code: '',
                        payment_method: 'كاش'
                    })
                });

                const data = await res.json();
                if (data.success) {
                    showToast('🎉 تم الطلب بنجاح! سيتم التواصل معك قريباً');
                    document.getElementById('customerName').value = '';
                    document.getElementById('customerPhone').value = '';
                    document.getElementById('customerAddress').value = '';
                } else {
                    showToast('❌ فشل إرسال الطلب: ' + (data.error || 'خطأ غير معروف'));
                }
            } catch (err) {
                showToast('❌ فشل الاتصال بالسيرفر');
            } finally {
                btn.disabled = false;
                btn.innerText = '✅ تأكيد الطلب';
            }
        }

        async function loadProduct() {
            if (!productId) {
                window.location.href = '/';
                return;
            }

            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                currentProduct = products.find(p => p.id == productId);

                if (!currentProduct) {
                    document.getElementById('productDetail').innerHTML = `
                        <div style="text-align: center; padding: 50px; width: 100%;">
                            <p style="color: #ef4444;">❌ المنتج غير موجود</p>
                            <a href="/" style="color: #e67e22;">العودة للمتجر</a>
                        </div>
                    `;
                    return;
                }

                let stockClass = 'in-stock';
                let stockText = `✅ متوفر: ${currentProduct.stock_quantity || 0} قطعة`;

                document.getElementById('productDetail').innerHTML = `
                    <div class="product-gallery">
                        <img src="${currentProduct.image_url || 'https://via.placeholder.com/400x400/2c2c2c/d4af37?text=Product'}" class="main-img" onerror="this.src='https://via.placeholder.com/400x400/2c2c2c/d4af37?text=Product'">
                    </div>
                    <div class="product-info">
                        <h1 class="product-name">${currentProduct.name}</h1>
                        <div class="product-category"><i class="fas fa-tag"></i> ${currentProduct.category || 'عام'}</div>
                        <div class="product-price">${currentProduct.selling_price} ج.م</div>
                        <div class="product-stock ${stockClass}">${stockText}</div>
                        <div class="product-desc">${currentProduct.description || 'لا توجد تفاصيل إضافية لهذا المنتج.'}</div>
                        <div class="product-actions">
                            <button class="btn-whatsapp" onclick="window.open('https://wa.me/201065653401?text=أريد شراء: ${encodeURIComponent(currentProduct.name)}', '_blank')">
                                <i class="fab fa-whatsapp"></i> طلب عبر واتساب
                            </button>
                            <button class="btn-cart" onclick="addToCart()">
                                <i class="fas fa-cart-plus"></i> أضف للسلة
                            </button>
                        </div>
                        <div class="order-form">
                            <h3><i class="fas fa-truck"></i> اطلب الآن - الدفع عند الاستلام</h3>
                            <input type="text" id="customerName" placeholder="الاسم الكامل" required>
                            <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required>
                            <input type="text" id="customerAddress" placeholder="العنوان بالتفصيل" required>
                            <button onclick="submitDirectOrder()">✅ تأكيد الطلب</button>
                        </div>
                    </div>
                `;
            } catch (e) {
                console.error(e);
                document.getElementById('productDetail').innerHTML = `<div style="text-align:center; padding:50px;">❌ خطأ في تحميل المنتج</div>`;
            }
        }

        loadProduct();
    </script>
</body>
</html>
