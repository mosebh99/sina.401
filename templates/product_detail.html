<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض تفاصيل المنتج | Sina 401</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .details-container { max-width: 900px; margin: 40px auto; padding: 20px; display: flex; gap: 30px; flex-wrap: wrap; }
        .gallery-box { flex: 1; min-width: 300px; }
        .info-box { flex: 1; min-width: 300px; }
        .main-img { width: 100%; max-height: 380px; object-fit: cover; border-radius: 12px; border: 1px solid var(--primary); background: #000; }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div class="nav-links"><a href="/">⬅️ العودة للمتجر</a></div>
    </header>

    <div class="details-container" id="product-detail-view">
        <p style="text-align:center; width:100%; color:var(--text-muted);">جاري جلب تفاصيل المنتج من السحابة...</p>
    </div>

    <script>
        async function loadProductDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if(!productId) { window.location.href = '/'; return; }

            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const p = products.find(prod => prod.id == productId);

                if(!p) {
                    document.getElementById('product-detail-view').innerHTML = "❌ المنتج غير موجود.";
                    return;
                }

                document.getElementById('product-detail-view').innerHTML = `
                    <div class="gallery-box">
                        <img id="large-img" src="${p.image_url || '/static/css/logo.png.jpeg'}" class="main-img" onerror="this.src='/static/css/logo.png.jpeg'">
                    </div>
                    <div class="info-box">
                        <h2 style="color: var(--primary); margin-top: 0;">${p.name}</h2>
                        <p style="color: var(--text-muted); font-size: 14px;">القسم: ${p.category || 'عام'}</p>
                        <p style="line-height: 1.6; color: #ccc; white-space: pre-line;">${p.description || 'لا توجد تفاصيل إضافية لهذا المنتج.'}</p>
                        <div style="font-size: 22px; color: var(--primary); font-weight: bold; margin: 20px 0;">السعر: ${p.selling_price || 0} ج.م</div>
                        <button class="btn-primary" onclick="window.location.href='https://wa.me/201065653401?text=أريد طلب منتج: ${p.name}'" style="background:#25d366; color:white; border-radius:50px; padding:12px 25px; border:none; cursor:pointer; font-weight:bold;">شراء مباشر عبر واتساب 💬</button>
                    </div>
                `;
            } catch(e) {
                document.getElementById('product-detail-view').innerHTML = "❌ خطأ في جلب البيانات السحابية.";
            }
        }
        window.addEventListener('DOMContentLoaded', loadProductDetail);
    </script>
</body>
</html>
