<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الهاتف | سينا ستور</title>
    <style>
        :root { --primary: #d4af37; --bg-dark: #0a0a0a; --bg-card: #141414; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: 30px auto; background-color: var(--bg-card); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; padding: 30px; display: flex; gap: 30px; flex-wrap: wrap; }
        .prod-image { flex: 1; min-width: 300px; max-height: 400px; object-fit: cover; border-radius: 8px; background-color: #1a1a1a; }
        .prod-details { flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center; }
        h2 { color: var(--primary); margin-bottom: 15px; font-size: 28px; }
        .price { font-size: 24px; color: var(--primary); font-weight: bold; margin-bottom: 20px; }
        form { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background-color: #1a1a1a; color: #fff; }
        button { background: linear-gradient(135deg, var(--primary), #b8860b); color: #000; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container" id="product-container">
        <p style="text-align:center; width:100%;">جاري تحميل تفاصيل الهاتف...</p>
    </div>

    <script>
        const pId = new URLSearchParams(window.location.search).get('id');
        async function loadProduct() {
            if(!pId) return;
            try {
                const response = await fetch(`/api/products/${pId}`);
                const p = await response.json();
                const img = p.image_url || 'https://via.placeholder.com/400x400/141414/d4af37?text=Sina+Store+401';
                document.getElementById('product-container').innerHTML = `
                    <img class="prod-image" src="${img}" alt="${p.name}">
                    <div class="prod-details">
                        <h2>${p.name}</h2>
                        <div class="price">${p.selling_price} ج.م</div>
                        <p style="color:#aaa;">الفئة: ${p.category}</p>
                        <form onsubmit="submitOrder(event, ${p.selling_price}, '${p.name}')">
                            <input type="text" id="c-name" placeholder="اسم العميل بالكامل" required>
                            <input type="tel" id="c-phone" placeholder="رقم الهاتف" required>
                            <textarea id="c-address" placeholder="العنوان بالتفصيل" rows="3" required></textarea>
                            <button type="submit">تأكيد طلب الشراء الآن</button>
                        </form>
                    </div>`;
            } catch {
                document.getElementById('product-container').innerHTML = '<p style="color:red;">فشل تحميل المنتج.</p>';
            }
        }

        async function submitOrder(e, price, name) {
            e.preventDefault();
            const orderData = {
                customer_name: document.getElementById('c-name').value,
                customer_phone: document.getElementById('c-phone').value,
                customer_address: document.getElementById('c-address').value,
                total_price: price,
                products: [{id: parseInt(pId), name: name, qty: 1}],
                marketer_code: localStorage.getItem('marketer_ref_code') || null
            };
            try {
                const res = await fetch('/api/orders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(orderData) });
                const result = await res.json();
                if(result.success) {
                    alert(`🎉 تم تسجيل طلبك بنجاح! رقم طلبك هو: #${result.order_id} احتفظ به لتتبع حالة الشحن.`);
                    window.location.href = '/';
                }
            } catch { alert('حدث خطأ أثناء إرسال الطلب.'); }
        }
        loadProduct();
    </script>
</body>
</html>
