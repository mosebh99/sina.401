<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الهاتف وإتمام الشراء | سينا ستور 401</title>
    <style>
        :root {
            --primary: #d4af37;
            --primary-hover: #b8860b;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --text-light: #ffffff;
            --text-gray: #aaaaaa;
            --border-gold: rgba(212, 175, 55, 0.3);
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        header {
            background-color: #0d0d0d;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 40px;
        }

        .header-logo {
            font-size: 26px;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--text-light);
            padding: 8px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: var(--primary);
            color: #000000;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* الجزء الخاص بعرض صورة الهاتف */
        .product-display {
            background-color: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 450px;
            overflow: hidden;
            position: relative;
        }

        .product-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* الجزء الخاص ببيانات الهاتف وفورم الشراء */
        .product-purchase-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .phone-title {
            font-size: 26px;
            font-weight: bold;
            color: var(--text-light);
            margin-bottom: 15px;
        }

        .phone-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 25px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .form-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: var(--text-light);
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #000000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* التنبيهات الملونة نجاح / فشل */
        .status-alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .alert-success {
            background-color: rgba(34, 197, 94, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--error);
            color: var(--error);
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="header-logo">✨ سينا ستور 401</a>
        <a href="/" class="back-btn">⬅️ العودة للمعرض</a>
    </header>

    <div class="main-container">
        <div class="product-display">
            <img id="phone-image" class="product-img" src="https://via.placeholder.com/400x450?text=Sina+Store+401" alt="جاري التحميل...">
        </div>

        <div class="product-purchase-box">
            <h1 id="phone-name" class="phone-title">جاري تحميل اسم الهاتف...</h1>
            <div id="phone-price-val" class="phone-price">0 ج.م</div>

            <div id="alert-msg" class="status-alert"></div>

            <h3 class="form-title">📝 استمارة طلب الشراء الشحن الفوري</h3>
            <form id="order-form">
                <div class="input-group">
                    <label for="cust-name">اسم المشتري (العميل بالكامل):</label>
                    <input type="text" id="cust-name" required placeholder="أدخل الاسم الثلاثي للعميل">
                </div>

                <div class="input-group">
                    <label for="cust-phone">رقم الهاتف الفعال (للتواصل والشحن):</label>
                    <input type="tel" id="cust-phone" required placeholder="01xxxxxxxxx">
                </div>

                <div class="input-group">
                    <label for="cust-address">عنوان التوصيل والإقامة بالتفصيل:</label>
                    <textarea id="cust-address" rows="3" required placeholder="المحافظة - المدينة - اسم الشارع أو علامة مميزة"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="send-order-btn">🚀 تأكيد طلب الشراء الآن</button>
            </form>
        </div>
    </div>

    <script>
        let currentPhoneData = null;

        // قراءة الـ ID الخاص بالهاتف من رابط الصفحة
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // جلب بيانات الهاتف المختار من السيرفر فور تحميل الصفحة
        async function loadProductDetails() {
            if (!productId) {
                alert("معرف الهاتف غير صحيح!");
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch(`/api/products/${productId}`);
                if (response.ok) {
                    currentPhoneData = await response.json();
                    
                    // تعبئة البيانات في الواجهة
                    document.getElementById('phone-name').innerText = currentPhoneData.name;
                    document.getElementById('phone-price-val').innerText = `${currentPhoneData.selling_price} ج.م`;
                    if (currentPhoneData.image_url) {
                        document.getElementById('phone-image').src = currentPhoneData.image_url;
                    }
                    document.title = `${currentPhoneData.name} | سينا ستور 401`;
                } else {
                    alert("عذراً، هذا الهاتف غير متاح حالياً بالسيستم.");
                    window.location.href = '/';
                }
            } catch (err) {
                alert("خطأ في الاتصال بالخادم الرئيسي لجلب تفاصيل الموبايل.");
            }
        }

        // إرسال الطلب بشكل سليم ومطابق لهيكلة الـ JSON المطلوبة بالسيرفر
        document.getElementById('order-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('send-order-btn');
            const alertBox = document.getElementById('alert-msg');
            
            // قراءة البيانات من الفورم
            const customerName = document.getElementById('cust-name').value.trim();
            const customerPhone = document.getElementById('cust-phone').value.trim();
            const customerAddress = document.getElementById('cust-address').value.trim();
            
            // استرجاع كود المسوق المخزن في المتصفح إن وجد
            const marketerCode = localStorage.getItem('affiliate_code') || null;

            // تجهيز مصفوفة المنتجات المتوافقة تماماً مع السيرفر والـ JSONB
            const orderProducts = [{
                id: currentPhoneData.id,
                name: currentPhoneData.name,
                price: currentPhoneData.selling_price
            }];

            // تجهيز الحمولة النهائية
            const payload = {
                customer_name: customerName,
                customer_phone: customerPhone,
                customer_address: customerAddress,
                total_price: currentPhoneData.selling_price,
                products: orderProducts,
                marketer_code: marketerCode
            };

            // قفل زر الإرسال لتجنب التكرار
            btn.disabled = true;
            btn.innerText = '⏳ جاري إرسال طلبك وتسجيله بالسيستم...';
            
            alertBox.style.display = 'none';
            alertBox.className = 'status-alert';

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // إظهار تنبيه النجاح وتصفير الاستمارة
                    alertBox.innerText = `🎉 تم تسجيل طلبك بنجاح! رقم طلبك هو: #${data.order_id} احتفظ به لتتبع حالته.`;
                    alertBox.classList.add('alert-success');
                    alertBox.style.display = 'block';
                    document.getElementById('order-form').reset();
                } else {
                    // إظهار رسالة الخطأ القادمة من السيرفر
                    alertBox.innerText = `❌ فشل إرسال الطلب. برجاء المحاولة مجدداً. السبب: ${data.error || 'بيانات غير مكتملة'}`;
                    alertBox.classList.add('alert-error');
                    alertBox.style.display = 'block';
                }
            } catch (error) {
                alertBox.innerText = '❌ فشل إرسال الطلب. حدث خطأ في الاتصال بالسيرفر، يرجى مراجعة شبكة الإنترنت لديك.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
            } finally {
                // إعادة تفعيل الزر مجدداً
                btn.disabled = false;
                btn.innerText = '🚀 تأكيد طلب الشراء الآن';
            }
        });

        // تشغيل الجلب فور تحميل الصفحة
        window.addEventListener('DOMContentLoaded', loadProductDetails);
    </script>
</body>
</html>
