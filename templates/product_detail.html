<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | سينا ستور الفاخر</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --bg-input: #1a1a1a;
            --gold: #d4af37;
            --gold-hover: #b8860b;
            --gold-light: rgba(212, 175, 55, 0.08);
            --text-white: #ffffff;
            --text-muted: #999999;
            --success: #22c55e;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* هيدر المتجر الفاخر */
        header {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .logo-brand h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .back-store-btn {
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            background: var(--gold-light);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: var(--transition);
        }

        .back-store-btn:hover {
            background: var(--gold);
            color: var(--bg-main);
        }

        /* حاوية تفاصيل المنتج الكبرى */
        .details-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* معرض صور واستعراض المنتج */
        .product-gallery {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-gallery img {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            border-radius: var(--radius-md);
            background: #0f0f0f;
            transition: var(--transition);
        }

        /* معلومات الشراء والفحص والطلب السريع */
        .product-info-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .product-meta h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .category-tag {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            font-weight: 600;
        }

        .price-tag-large {
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-tag-large span {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* بنية نموذج الشراء السريع والدفع عند الاستلام */
        .checkout-card {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: var(--radius-lg);
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .checkout-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            background: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.1);
        }

        .order-submit-btn {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: var(--bg-main);
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            transition: var(--transition);
            margin-top: 5px;
        }

        .order-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.3);
        }

        .order-submit-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* بار تنبيهات ومزايا المتجر التنافسية */
        .features-badge-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .f-badge {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .f-badge i { color: var(--gold); font-size: 14px; }

        /* توست الإشعارات الفوري */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #141414;
            border-right: 4px solid var(--gold);
            color: #fff;
            padding: 16px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            z-index: 99999;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* التجاوب التام مع الجوال والشاشات الصغيرة */
        @media (max-width: 768px) {
            .details-container {
                grid-template-columns: 1fr;
                gap: 25px;
                margin: 20px auto;
            }
            .product-gallery { position: relative; top: 0; }
            .product-meta h2 { font-size: 22px; }
            .price-tag-large { font-size: 26px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-brand" onclick="window.location.href='/'">
            <h1><i class="fa-solid fa-mobile-retro"></i> سينا ستور 401</h1>
        </div>
        <a href="/" class="back-store-btn"><i class="fa-solid fa-arrow-right-to-bracket"></i> العودة للمتجر</a>
    </header>

    <main class="details-container">
        
        <section class="product-gallery">
            <img id="detail-product-image" src="/static/css/logo.png.jpeg" alt="جاري التحميل...">
        </section>

        <section class="product-info-panel">
            <div class="product-meta">
                <span class="category-tag" id="detail-product-category">تصنيف عام</span>
                <h2 id="detail-product-name">جاري تحميل اسم المنتج الفاخر...</h2>
                <div class="price-tag-large" id="detail-product-price">
                    0 ج.م <span>(الدفع عند الاستلام المعاينه أولاً)</span>
                </div>
            </div>

            <div class="checkout-card">
                <h3><i class="fa-solid fa-truck-fast"></i> استمارة الشراء السريع والآمن</h3>
                <form id="customer-order-form" onsubmit="handlePlaceCustomerOrder(event)">
                    <div class="form-group">
                        <label for="c-name">الاسم الكامل للعميل</label>
                        <input type="text" id="c-name" required placeholder="برجاء كتابة الاسم ثنائي أو ثلاثي">
                    </div>
                    
                    <div class="form-group">
                        <label for="c-phone">رقم الموبايل للتواصل</label>
                        <input type="tel" id="c-phone" required placeholder="مثال: 010XXXXXXXX">
                    </div>

                    <div class="form-group">
                        <label for="c-address">عنوان التوصيل بالتفصيل</label>
                        <textarea id="c-address" rows="3" required placeholder="المحافظة - المركز - اسم الشارع أو علامة مميزة"></textarea>
                    </div>

                    <button type="submit" class="order-submit-btn" id="order-submit-btn">
                        <i class="fa-solid fa-circle-check"></i> تأكيد طلب الشراء الآن
                    </button>
                </form>
            </div>

            <div class="features-badge-list">
                <div class="f-badge"><i class="fa-solid fa-shield-halved"></i> معاينة وفحص قبل الاستلام</div>
                <div class="f-badge"><i class="fa-solid fa-truck-ramp-box"></i> شحن سريع لكل المحافظات</div>
                <div class="f-badge"><i class="fa-solid fa-clock-rotate-left"></i> ضمان استبدال واسترجاع مرن</div>
                <div class="f-badge"><i class="fa-solid fa-headset"></i> دعم فني وخدمة عملاء 24 ساعة</div>
            </div>
        </section>

    </main>

    <script>
        let currentProduct = null;
        let affiliateCode = null;

        // إظهار التنبيهات الفاخرة المدمجة
        function showToast(message) {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `<i class="fa-solid fa-circle-check" style="color: var(--gold)"></i> <span>${message}</span>`;
            document.body.appendChild(toast);

            setTimeout(() => { toast.remove(); }, 4000);
        }

        // دالة التقاط كود الأفلييت والمسوق من الرابط بذكاء ومزامنتها محلياً في المتصفح
        function detectAffiliateCode() {
            const urlParams = new URLSearchParams(window.location.search);
            // البحث عن الباراميترز المحتملة m أو ref أو code لضمان عدم ضياع أي عمولة
            const code = urlParams.get('m') || urlParams.get('ref') || urlParams.get('code');
            
            if (code) {
                localStorage.setItem('affiliate_code', code);
                affiliateCode = code;
                console.log("🎯 تم رصد وتوثيق كود المسوق بنجاح في النظام:", code);
            } else {
                // استرجاع الكود المحفوظ مسبقاً إذا كان العميل يتصفح الموقع لتفادي ضياع الكوكي والعمولة
                affiliateCode = localStorage.getItem('affiliate_code');
            }
        }

        // جلب تفاصيل المنتج سحابياً بناءً على الـ ID الممرر في مسار الصفحة
        async function loadProductDetail() {
            detectAffiliateCode(); // استدعاء فحص كود الأفلييت أولاً

            // استخراج الـ ID من مسار الرابط الحالي
            const pathParts = window.location.pathname.split('/');
            const productId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

            if (!productId || isNaN(productId)) {
                document.getElementById('detail-product-name').innerText = "⚠️ لم يتم العثور على المنتج المطلوب.";
                return;
            }

            try {
                const res = await fetch(`/api/products/${productId}`);
                if (!res.ok) throw new Error("Product not found");
                currentProduct = await res.json();

                // رندرة وتحديث بيانات الواجهة حياً
                document.title = `${currentProduct.name} | سينا ستور`;
                document.getElementById('detail-product-name').innerText = currentProduct.name;
                document.getElementById('detail-product-category').innerText = currentProduct.category || "أجهزة وهواتف";
                document.getElementById('detail-product-price').innerHTML = `${currentProduct.selling_price} ج.م <span>(الدفع نقداً عند استلام الشحنة)</span>`;
                
                if (currentProduct.image_url) {
                    document.getElementById('detail-product-image').src = currentProduct.image_url;
                    document.getElementById('detail-product-image').alt = currentProduct.name;
                }
            } catch (e) {
                console.error("Error loading product details:", e);
                document.getElementById('detail-product-name').innerText = "❌ حدث خطأ أثناء سحب تفاصيل المنتج من السيرفر السحابي.";
            }
        }

        // التعامل مع إرسال استمارة حجز وشراء المنتج وربطه بكود المسوق تلقائياً
        async function handlePlaceCustomerOrder(event) {
            event.preventDefault();
            if (!currentProduct) {
                alert("برجاء الانتظار حتى اكتمال تحميل بيانات المنتج.");
                return;
            }

            const name = document.getElementById('c-name').value.trim();
            const phone = document.getElementById('c-phone').value.trim();
            const address = document.getElementById('c-address').value.trim();

            const submitBtn = document.getElementById('order-submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري إرسال وتأمين طلبك...`;

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_name: name,
                        customer_phone: phone,
                        customer_address: address,
                        total_price: currentProduct.selling_price,
                        // إرسال مصفوفة المنتجات المتوافقة تماماً مع بنية الجداول الخلفية في السيرفر
                        products: [{
                            id: currentProduct.id,
                            name: currentProduct.name,
                            price: currentProduct.selling_price,
                            qty: 1
                        }],
                        marketer_code: affiliateCode || null, // تمرير كود المسوق إن وجد لحساب عمولته الثابتة فوراً
                        status: 'قيد المراجعة'
                    })
                });

                if (res.ok) {
                    showToast("🎉 تم تسجيل وطلب المنتج بنجاح! سيقوم موظف خدمة العملاء بالاتصال بك لتأكيد الشحن فوراً.");
                    document.getElementById('customer-order-form').reset();
                    // تصفية كود الأفلييت المحلي بعد نجاح الطلب لجهوزية العمليات القادمة
                    if (urlHasAffiliateCode()) localStorage.removeItem('affiliate_code');
                } else {
                    showToast("❌ فشل إرسال الطلب. برجاء مراجعة البيانات والمحاولة مجدداً.");
                }
            } catch (e) {
                showToast("❌ حدث خطأ في الاتصال بالخادم. تحقق من إنترنت جهازك.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> تأكيد طلب الشراء الآن`;
            }
        }

        // ميثود مساعدة لفحص إذا كان الرابط الحالي يحتوي بالفعل على كود
        function urlHasAffiliateCode() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.has('m') || urlParams.has('ref') || urlParams.has('code');
        }

        // تهيئة وتشغيل جلب البيانات بمجرد اكتمال رندرة الجداول
        window.addEventListener('DOMContentLoaded', loadProductDetail);
    </script>
</body>
</html>
