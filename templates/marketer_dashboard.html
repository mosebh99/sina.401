        header {
            background: rgba(10,10,10,0.98);

            z-index: 1000;
        }

            font-weight: 800;

        }
        .header-actions {

            gap: 15px;

            color: #d4af37;
            font-weight: bold;

            font-weight: bold;
            transition: all 0.3s;
            font-family: inherit;
        }
        .logout-btn:hover { background: #dc2626; }
