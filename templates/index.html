<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sina 401 | متجر سينا لملحقات الموبايل</title>
    <link rel="icon" type="image/png" href="logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root { --primary: #d4af37; --bg: #0d0d0d; --card-bg: #141414; --text: #ffffff; --text-muted: #a3a3a3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        header { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; position: relative; }
        header h1 { color: var(--primary); margin: 0; font-size: 24px; font-weight: bold; }
        header h1 a { color: var(--primary); text-decoration: none; }
        
        .menu-dots { font-size: 28px; color: var(--primary); cursor: pointer; padding: 0 10px; user-select: none; }
        
        .dropdown-menu { display: none; position: absolute; top: 60px; left: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; width: 200px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; overflow: hidden; }
        .dropdown-menu a { display: block; padding: 12px 15px; color: #fff; text-decoration: none; transition: 0.2s; text-align: right; font-size: 14px; }
        .dropdown-menu a:hover { background: var(--primary); color: #000; }
        .dropdown-menu.show { display: block; }

        .hero-banner { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #141414 0%, #0d0d0d 100%); border-bottom: 1px solid #1f1f1f; }
        .hero-banner h2 { color: var(--primary); font-size: 28px; margin: 0 0 10px 0; font-weight: 800; }

        .controls-row { max-width: 1000px; margin: 20px auto; padding: 0 20px; display: flex; gap: 10px; }
        .search-input, .filter-select { background: #141414; border: 1px solid #2a2a2a; padding: 12px 15px; color: #fff; border-radius: 8px; font-size: 14px; outline: none; }
        .search-input { flex: 1; }
        .filter-select { width: 150px; cursor: pointer; }

        .products-grid { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border: 1px solid #1f1f1f; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .card-body { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-body h3 { margin: 0 0 10px 0; font-size: 16px; font-weight: bold; }
        .card-body h3 a { color: #fff; text-decoration: none; }
        .price-box { font-size: 18px; color: var(--primary); font-weight: bold; margin-bottom: 10px; }

        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, #b89020 100%); color: #000; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; }

        .widget-box { max-width: 500px; margin: 30px auto; padding: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid #1f1f1f; }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="menu-dots" onclick="toggleMenu(event)">⋮</span>
            <div class="dropdown-menu" id="dots-menu">
                <a href="/">🏠 المتجر الرئيسي</a>
                <a href="/login.html">🔐 بوابة المسوقين والإدارة</a>
            </div>
        </div>
    </header>

    <div class="hero-banner">
        <h2>👑 الفخامة والتميز في مكان واحد</h2>
        <p style="color:var(--text-muted); margin:0;">اكتشف أقوى عروض ملحقات الموبايل بضمان سينا ستور الأصلي</p>
    </div>

    <div class="controls-row">
        <input type="text" id="search-box" class="search-input" placeholder="ابحث عن منتجك المفضل..." oninput="handleSearchAndFilter()">
        <select id="category-filter" class="filter-select" onchange="handleSearchAndFilter()">
            <option value="all">كل الأقسام</option>
            <option value="عام">عام وإلكترونيات</option>
            <option value="ساعات ذكية">ساعات ذكية</option>
            <option value="سماعات">سماعات بلوتوث</option>
            <option value="شواحن">شواحن وكوابل</option>
        </select>
    </div>

    <div class="products-grid" id="products-container">
        <p style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">جاري تحميل منتجات المخزن السحابي...</p>
    </div>

    <div class="widget-box">
        <h3 style="color:var(--primary); text-align:center; margin-top:0; margin-bottom:15px;">📦 تتبع حالة شحنتك فوراً</h3>
        <div style="display:flex; gap:10px;">
            <input type="tel" id="track-phone" class="search-input" style="flex:1;" placeholder="رقم الهاتف المسجل بالطلب...">
            <button class="btn-primary" style="width:auto; margin:0; padding:0 20px;" onclick="trackMyOrder()">تتبع</button>
        </div>
        <div id="track-output" style="margin-top:15px;"></div>
    </div>

    <script>
        let allProducts = [];

        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('dots-menu').classList.toggle('show');
        }

        async function loadStore() {
            try {
                const res = await fetch('/api/products');
                allProducts = await res.json();
                renderProducts(allProducts);
            } catch (err) {
                document.getElementById('products-container').innerHTML = `<p style="grid-column:1/-1; text-align:center; color:red;">❌ فشل جلب المنتجات.</p>`;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            if(products.length === 0) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">لا توجد منتجات تطابق البحث.</p>`;
                return;
            }
            products.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image_url || '/logo.png.jpeg'}" alt="${p.name}" onerror="this.src='/logo.png.jpeg'">
                        <div class="card-body">
                            <h3><a href="/product/${p.id}">${p.name}</a></h3>
                            <div>
                                <div class="price-box">${p.selling_price || 0} ج.م</div>
                                <button class="btn-primary" onclick="window.location.href='/product/${p.id}'">🔎 عرض التفاصيل والشراء</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function handleSearchAndFilter() {
            const query = document.getElementById('search-box').value.toLowerCase().trim();
            const category = document.getElementById('category-filter').value;

            let filtered = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(query) || (p.description && p.description.toLowerCase().includes(query));
                const matchesCategory = (category === 'all' || p.category === category);
                return matchesSearch && matchesCategory;
            });
            renderProducts(filtered);
        }

        // 🚀 دالة تتبع الطلبات المصلحة والمحمية من الـ Crash بنسبة 100%
        async function trackMyOrder() {
            const phoneInput = document.getElementById('track-phone').value.trim();
            const out = document.getElementById('track-output');
            if(!phoneInput) { alert("من فضلك أدخل رقم الهاتف المسجل به الطلب"); return; }
            
            out.innerHTML = "🔍 جاري الفحص والسحب من السجلات السحابية...";
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                
                // البحث المرن عن الطلب المتوافق مع رقم الهاتف
                let myOrder = orders.find(o => o.customer_phone && o.customer_phone.trim() === phoneInput);
                
                if(myOrder) {
                    // قراءة السعر الصحيح والموحد مع السيرفر لمنع الأخطاء
                    let displayTotal = myOrder.total_price ? myOrder.total_price : (myOrder.total_val ? myOrder.total_val : 0);
                    
                    out.innerHTML = `
                        <div style="background:#1a1a1a; padding:15px; border-radius:8px; border-right:4px solid var(--primary); text-align:right;">
                            <p style="margin:5px 0;">📦 رقم الشحنة: <strong>#${myOrder.id}</strong></p>
                            <p style="margin:5px 0;">🚦 حالة الشحنة الحالية: <span style="color:var(--primary); font-weight:bold;">🔄 ${myOrder.status || 'قيد المراجعة في المخزن'}</span></p>
                            <p style="margin:5px 0;">💰 إجمالي الحساب: <strong style="color:var(--primary);">${displayTotal} ج.م</strong></p>
                        </div>`;
                } else {
                    out.innerHTML = `<p style="color:#ef4444; text-align:center; font-weight:bold;">❌ لم نجد أي طلبات شحن مسجلة برقم الهاتف هذا.</p>`;
                }
            } catch(e) {
                out.innerHTML = `<p style="color:#ef4444; text-align:center;">❌ حدث خطأ أثناء الاتصال بالسيرفر.</p>`;
            }
        }

        window.onclick = function() { const m = document.getElementById('dots-menu'); if(m) m.classList.remove('show'); }
        window.addEventListener('DOMContentLoaded', loadStore);
    </script>
</body>
</html>
