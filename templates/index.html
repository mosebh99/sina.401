<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sina 401 | متجر سينا لملحقات الموبايل</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .menu-dots { font-size: 28px; color: var(--primary); cursor: pointer; padding: 0 10px; user-select: none; }
        .dropdown-menu { display: none; position: absolute; top: 60px; left: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; width: 200px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; overflow: hidden; }
        .dropdown-menu a { display: block; padding: 12px 15px; color: #fff; text-decoration: none; transition: 0.2s; text-align: right; font-size: 14px; }
        .dropdown-menu a:hover { background: var(--primary); color: #000; }
        .dropdown-menu.show { display: block; }
    </style>
</head>
<body>

    <div class="toast" id="toast-notification"></div>

    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="color: var(--primary); font-weight: bold; font-size: 14px;">🛒 السلة (<span id="cart-count">0</span>)</span>
            <span class="menu-dots" onclick="toggleMenu(event)">⋮</span>
            <div class="dropdown-menu" id="dots-menu">
                <a href="/">🏠 المتجر الرئيسي</a>
                <a href="/login.html">🔐 لوحة الإدارة والعبور</a>
                <a href="/marketers.html">📊 بوابة المسوقين</a>
            </div>
        </div>
    </header>

    <div class="hero-banner">
        <h2>👑 الفخامة والتميز في مكان واحد</h2>
        <p>اكتشف أقوى العروض والملحقات بضمان سينا ستور الأصلي</p>
    </div>

    <div class="controls-row">
        <input type="text" id="search-box" class="search-input" placeholder="ابحث عن منتجك المفضل..." oninput="handleSearchAndFilter()">
        
        <select id="category-filter" class="filter-select" onchange="handleSearchAndFilter()">
            <option value="all">كل الأقسام</option>
            <option value="عام">عام وإلكترونيات</option>
            <option value="ساعات ذكية">ساعات ذكية</option>
            <option value="سماعات">سماعات بلوتوث</option>
            <option value="شواحن">شواحن وكوابل</option>
        </select>

        <select id="sort-select" class="filter-select" onchange="handleSearchAndFilter()">
            <option value="default">الترتيب الافتراضي</option>
            <option value="price-low">السعر: من الأقل للأعلى</option>
            <option value="price-high">السعر: من الأعلى للأقل</option>
        </select>
    </div>

    <div class="products-grid" id="products-container">
        <p style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">جاري تحميل المنتجات من المخزن السحابي...</p>
    </div>

    <div style="max-width: 500px; margin: 40px auto; padding: 20px; background:var(--card-bg); border-radius:12px; border:1px solid #222;">
        <h3 style="color:var(--primary); text-align:center; margin-top:0; margin-bottom:15px;">📦 تتبع حالة شحنتك فوراً</h3>
        <div style="display:flex; gap:10px;">
            <input type="tel" id="track-phone" class="search-input" style="flex:1;" placeholder="رقم الهاتف المسجل بالطلب...">
            <button class="btn-primary" style="width:auto; margin:0; padding:0 20px;" onclick="trackMyOrder()">تتبع الشحنة</button>
        </div>
        <div id="track-output"></div>
    </div>

    <a href="https://wa.me/201065653401" class="floating-whatsapp" target="_blank" style="position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 999; text-decoration: none; font-size: 30px;">💬</a>

    <script src="/static/js/store.js"></script>
    <script>
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('dots-menu').classList.toggle('show');
        }
        window.onclick = function() { const m = document.getElementById('dots-menu'); if(m) m.classList.remove('show'); }
    </script>
</body>
</html>
