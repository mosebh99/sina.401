<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينا ستور 401 | منصة الهواتف الذكية</title>
    <style>
        :root {
            --primary: #d4af37;
            --primary-hover: #b8860b;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --text-light: #ffffff;
            --text-gray: #aaaaaa;
            --border-gold: rgba(212, 175, 55, 0.3);
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الهيدر العلوي للموقع */
        header {
            background-color: #0d0d0d;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo {
            font-size: 26px;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--text-light);
            padding: 8px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: var(--primary);
            color: #000000;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .admin-link {
            color: var(--text-gray);
            border-color: #333333;
        }

        /* قسم الهيرو العلوي والبحث للتتبع والمنتجات */
        .hero-section {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(180deg, #111111 0%, #0a0a0a 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .hero-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .search-wrapper {
            max-width: 650px;
            margin: 0 auto 20px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background-color: #161616;
            border: 2px solid var(--border-gold);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 16px;
            text-align: right;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .search-icon {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            color: var(--primary);
            pointer-events: none;
        }

        /* صندوق التتبع الخاص بالزبائن */
        .track-box {
            max-width: 650px;
            margin: 15px auto 0 auto;
            display: flex;
            background-color: #161616;
            border: 1px solid var(--border-gold);
            border-radius: 8px;
            overflow: hidden;
        }

        .track-input {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 15px;
            text-align: center;
        }

        .track-input:focus {
            outline: none;
        }

        .track-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #000000;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .track-btn:hover {
            opacity: 0.9;
        }

        /* شبكة المنتجات (الهواتف الذكية والأجهزة) */
        .container {
            max-width: 1250px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            border-right: 4px solid var(--primary);
            padding-right: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
        }

        /* شارة عمولة نشطة المطابقة للصورة المرفوعة */
        .commission-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.75);
            border: 1px solid var(--primary);
            color: #ffffff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        .product-image-container {
            width: 100%;
            height: 270px;
            background-color: #1b1b1b;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .product-category {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 6px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--text-light);
            line-height: 1.4;
        }

        .product-price-row {
            margin-top: auto;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-label {
            font-size: 14px;
            color: var(--text-gray);
        }

        .price-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #000000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .action-btn:hover {
            opacity: 0.95;
        }

        /* نافذة تتبع النتيجة سريعة */
        #track-output-modal {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            display: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <header>
