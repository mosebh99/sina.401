<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sina Store 401 - المتجر الرئيسي</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-section">
            <img src="/static/css/logo.png.jpeg" alt="Sina 401 Logo" class="brand-logo">
            <h1>Sina Store 401</h1>
        </div>
        <nav class="nav-links">
            <a href="/">🏠 الرئيسية</a>
            <a href="/marketers.html">📊 بوابة المسوقين</a>
            <a href="/login.html">🔐 لوحة الإدارة</a>
        </nav>
    </header>

    <main class="store-container">
        <section class="filter-bar">
            <input type="text" id="search-box" placeholder="🔍 ابحث عن إكسسوارات، شواحن، كابلات..." oninput="handleSearchAndFilter()">
            <select id="category-filter" onchange="handleSearchAndFilter()">
                <option value="all">كل الأقسام</option>
                <option value="شواحن">شواحن وطاقة</option>
                <option value="كابلات">كابلات ووصلات</option>
                <option value="جرابات">جرابات وحماية</option>
                <option value="سماعات">سماعات وصوتيات</option>
            </select>
        </section>

        <section class="tracking-section" style="margin-bottom: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px;">
            <h3>📦 تتبع حالة شحنتك</h3>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="track-phone" placeholder="أدخل رقم الهاتف المسجل به الطلب" style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #111; color: #fff;">
                <button class="btn-primary" onclick="trackMyOrder()" style="padding: 8px 15px;">بحث</button>
            </div>
            <div id="track-output"></div>
        </section>

        <section class="products-grid" id="products-container">
            <p style="grid-column: 1/-1; text-align:center;">🔄 جاري تحميل أحدث المنتجات من المخزن السحابي...</p>
        </section>
    </main>

    <div id="toast-notification" class="toast"></div>

    <script src="/static/js/store.js"></script>
</body>
</html>
