<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sina 401 | متجر سينا لملحقات الموبايل</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css?v=1.1">
    <style>
        .menu-dots { font-size: 28px; color: var(--primary); cursor: pointer; padding: 0 10px; user-select: none; }
        .dropdown-menu { display: none; position: absolute; top: 60px; left: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; width: 200px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; overflow: hidden; }
        .dropdown-menu a { display: block; padding: 12px 15px; color: #fff; text-decoration: none; transition: 0.2s; text-align: right; font-size: 14px; }
        .dropdown-menu a:hover { background: var(--primary); color: #000; }
        .dropdown-menu.show { display: block; }
        
        /* تنسيق قسم السلة والمشتريات العائمة */
        .cart-badge { background: var(--primary); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .track-box { max-width: 600px; margin: 20px auto; padding: 20px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 15px; }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">👑 Sina Store 401</a></h1>
        <div class="nav-links" style="position: relative; display: flex; align-items: center; gap: 15px;">
            <a href="/marketers.html">📊 بوابة المسوقين</a>
            <span class="menu-dots" onclick="toggleDropdown(event)">⋮</span>
            <div id="main-dropdown" class="dropdown-menu">
                <a href="/login.html">🔐 لوحة الكاشير والمخزن</a>
                <a href="#track-section">🔍 تتبع حالة شحنتك</a>
            </div>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="ابحث عن كفرات، سكرينات، شواحن..." oninput="filterProducts()">
    </div>

    <main class="products-container" id="products-list">
        <p style="text-align: center; color: var(--text-muted); grid-column: 1/-1; padding: 50px 0;">⏳ جاري تحميل معروضات المخزن الحية...</p>
    </main>

    <section id="track-section" class="track-box">
        <h3 style="color: var(--primary); margin-top: 0; text-align: center;">🚚 تتبع حالة شحنتك الحية</h3>
        <p style="color: var(--text-muted); font-size: 13px; text-align: center; margin-bottom: 15px;">أدخل رقم الهاتف الذي سجلت به طلبك لمعرفة مكانه وحالته الحالية في المخازن.</p>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="track-phone" class="search-input" placeholder="اكتب رقم موبايلك هنا...">
            <button class="btn-primary" onclick="trackClientOrder()" style="width: auto; margin-top: 0; padding: 0 20px; border-radius: 25px;">تتبع</button>
        </div>
        <div id="track-output"></div>
    </section>

    <a href="https://wa.me/201065653401" class="whatsapp-float" target="_blank" title="تواصل معنا مباشرة عبر واتساب">
        <svg viewBox="0 0 32 32" style="width:30px; height:30px; fill:#fff;">
            <path d="M16 2a13 13 0 0 0-11.3 19.5L3 29l7.7-2A13 13 0 1 0 16 2zm0 24a11 11 0 0 1-5.6-1.5l-.4-.2-4.6 1.2 1.2-4.5-.3-.4A11 11 0 1 1 16 26zM21.5 18c-.3-.2-1.7-.8-2-.9-.3-.1-.5-.2-.7.1s-.8.9-1 1.1-.4.2-.7.1a9.2 9.2 0 0 1-3.6-2.2 10.2 10.2 0 0 1-2.5-3.1c-.2-.3 0-.5.1-.7l.4-.4c.1-.2.2-.3.3-.4l.2-.3c.1-.2 0-.4 0-.5l-.7-1.7c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4a3.4 3.4 0 0 0-1.1 2.5 6 6 0 0 0 1.2 3.2 13.5 13.5 0 0 0 5.2 4.6c2.8 1.2 3.4.9 4 .9a3.4 3.4 0 0 0 2.3-1.6c.3-.8.3-1.4.2-1.6s-.3-.2-.6-.3z"/>
        </svg>
    </a>

    <script>
        let allProducts = [];

        // تشغيل الـ Dropdown Menu
        function toggleDropdown(e) {
            e.stopPropagation();
            document.getElementById('main-dropdown').classList.toggle('show');
        }
        window.onclick = function() {
            document.getElementById('main-dropdown').classList.remove('show');
        }

        // جلب السلع من السيرفر وعرضها بكروت متناسقة
        async function loadStoreProducts() {
            try {
                const res = await fetch('/api/products');
                allProducts = await res.json();
                renderProducts(allProducts);
            } catch(e) {
                document.getElementById('products-list').innerHTML = `<p style="text-align:center; color:var(--danger); grid-column:1/-1;">❌ فشل جلب المنتجات السحابية.</p>`;
            }
        }

        function renderProducts(list) {
            const container = document.getElementById('products-list');
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:var(--text-muted); grid-column:1/-1;">🔍 عذراً، لا توجد منتجات تطابق بحثك حالياً.</p>`;
                return;
            }
            list.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <span class="category-badge">${p.category || 'عام'}</span>
                        <img src="${p.image_url || '/static/css/logo.png.jpeg'}" alt="${p.name}" onerror="this.src='/static/css/logo.png.jpeg'">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p>${p.description || 'ملحقات موبايل ممتازة ومضمونة من متجرنا.'}</p>
                            <div class="price-tag">${p.selling_price} ج.م</div>
                            <button class="btn-primary" onclick="window.location.href='/product_detail.html?id=${p.id}'">🛒 عرض التفاصيل والشراء</button>
                        </div>
                    </div>
                `;
            });
        }

        // فلترة السلع فورياً أثناء الكتابة في خانة البحث
        function filterProducts() {
            const txt = document.getElementById('search-bar').value.toLowerCase().trim();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(txt) || (p.category && p.category.toLowerCase().includes(txt)));
            renderProducts(filtered);
        }

        // خوارزمية تتبع الشحنات للعميل برقم التليفون
        async function trackClientOrder() {
            const phoneInput = document.getElementById('track-phone').value.trim();
            const out = document.getElementById('track-output');
            if(!phoneInput) { alert("من فضلك أدخل رقم الهاتف المسجل به الطلب"); return; }
            out.innerHTML = "<p style='color:var(--primary); margin-top:15px;'>🔍 جاري فحص حالة طلبك في سجلات المزامنة السحابية...</p>";
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                let myOrders = orders.filter(o => o.customer_phone && o.customer_phone.trim() === phoneInput);
                
                if(myOrders.length > 0) {
                    out.innerHTML = '';
                    myOrders.forEach(myOrder => {
                        out.innerHTML += `
                            <div style="background:#141414; padding:15px; border-radius:8px; border-right:4px solid var(--primary); margin-top:15px; text-align:right;">
                                <p style="margin:5px 0;">📦 رقم الشحنة: <strong>#${myOrder.id}</strong></p>
                                <p style="margin:5px 0;">🚦 حالة الطلب الحالية: <span style="color:var(--primary); font-weight:bold;">🔄 ${myOrder.status || 'قيد المراجعة'}</span></p>
                                <p style="margin:5px 0;">💰 إجمالي الحساب: <strong>${myOrder.total_price || 0} ج.م</strong></p>
                            </div>
                        `;
                    });
                } else { 
                    out.innerHTML = `<p style="color:var(--danger); text-align:center; margin-top:15px;">❌ لم نجد أي طلبات مسجلة بهذا الرقم في السيستم.</p>`; 
                }
            } catch(e) { 
                out.innerHTML = `<p style="color:var(--danger); text-align:center; margin-top:15px;">❌ حدث خطأ أثناء جلب تفاصيل شحنتك.</p>`; 
            }
        }

        // التنفيذ عند تحميل الصفحة بالكامل
        window.addEventListener('DOMContentLoaded', loadStoreProducts);
    </script>
</body>
</html>
