<!DOCTYPE html>
<html lang=\"ar\" dir=\"rtl\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>Sina 401 | متجر سينا لملحقات الموبايل</title>\n    <link rel=\"icon\" type=\"image/png\" href=\"/static/css/logo.png.jpeg\">
    <link rel=\"stylesheet\" href=\"/static/css/style.css\">
    <style>
        .menu-dots { font-size: 28px; color: var(--primary); cursor: pointer; padding: 0 10px; user-select: none; }
        .dropdown-menu { display: none; position: absolute; top: 60px; left: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; width: 200px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; overflow: hidden; }
        .dropdown-menu a { display: block; padding: 12px 15px; color: #fff; text-decoration: none; transition: 0.2s; text-align: right; font-size: 14px; }
        .dropdown-menu a:hover { background: var(--primary); color: #000; }
        .dropdown-menu.show { display: block; }
        .cart-section { background: var(--card-bg); border: 1px solid var(--card-border); padding: 20px; border-radius: 12px; margin-top: 30px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: rgba(15,15,15,0.8); border: 1px solid #222; border-radius: 12px; padding: 15px; text-align: center; transition: 0.3s; position: relative; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--primary-gradient); color: #000; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 20px; }
    </style>
</head>
<body>

    <header>
        <div style="position: relative;">
            <div class="menu-dots" onclick="toggleMenu(event)">⋮</div>
            <div id="dropdown" class="dropdown-menu">
                <a href="/login.html">🔐 لوحة الإدارة</a>
                <a href="/marketers.html">📊 بوابة المسوقين</a>
            </div>
        </div>
        <h1><a href="/">Sina Store 401</a></h1>
        <div class="nav-links">✨ تميز بهاتفك</div>
    </header>

    <div class="container" style="max-width:1100px; margin:30px auto; padding:0 20px;">
        <div style="background:var(--card-bg); border:1px solid #222; padding:20px; border-radius:12px; margin-bottom:30px;">
            <h3 style="color:var(--primary); margin-top:0;">🔍 تتبع حالة شحنتك المزامنة</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="track-phone" class="search-input" placeholder="أدخل رقم الهاتف المسجل به الطلب..." style="flex:1;">
                <button class="btn-primary" onclick="trackUserOrder()" style="width:auto; margin-top:0; padding:0 25px;">تتبع الآن</button>
            </div>
            <div id="track-output"></div>
        </div>

        <h2 style="color:var(--primary); border-right:4px solid var(--primary); padding-right:10px;">🔥 أحدث ملحقات الموبايل المتاحة</h2>
        <div class="grid-container" id="products-catalog">
            <p style="text-align:center; color:var(--text-muted); width:100%;">⏳ جاري سحب المنتجات السحابية الحية...</p>
        </div>

        <div class="cart-section" id="cart-area">
            <h3 style="color:var(--primary); margin-top:0; display:flex; justify-content:between; align-items:center;">
                <span>🛒 سلة المشتريات الخاصة بك</span>
                <span id="cart-count" style="font-size:14px; background:#222; padding:4px 10px; border-radius:20px; color:var(--primary);">0 قطع</span>
            </h3>
            <div id="cart-items-list" style="color:var(--text-muted); font-size:14px;">السلة فارغة حالياً، أضف بعض المنتجات!</div>
            
            <div id="checkout-form-container" style="display:none; margin-top:20px; border-top:1px solid #222; padding-top:20px;">
                <h4 style="color:#fff; margin-bottom:15px;">📋 أكمل بيانات الشحن لتأكيد طلبك</h4>
                <form id="order-submit-form" style="display:flex; flex-direction:column; gap:12px;">
                    <input type="text" id="cust-name" class="search-input" placeholder="اسمك الكامل..." required>
                    <input type="tel" id="cust-phone" class="search-input" placeholder="رقم الهاتف للتواصل..." required>
                    <input type="text" id="cust-address" class="search-input" placeholder="عنوان الشحن بالتفصيل (المحافظة/المدينة)..." required>
                    <button type="submit" class="btn-primary">⚡ تأكيد وشحن الطلب فوراً</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentProducts = [];
        let cart = JSON.parse(localStorage.getItem('sina_cart')) || [];

        // 🔗 التقاط كود إحالة المسوق من الرابط تلقائياً وحفظه لحفظ عمولته
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                localStorage.setItem('active_marketer_id', refCode.trim());
                console.log('📌 Active Marketer Captured:', refCode);
            }
            loadCatalog();
            updateCartUI();
        });

        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('dropdown').classList.toggle('show');
        }
        document.addEventListener('click', () => document.getElementById('dropdown').classList.remove('show'));

        async function loadCatalog() {
            try {
                const res = await fetch('/api/products');
                currentProducts = await res.json();
                const container = document.getElementById('products-catalog');
                container.innerHTML = '';
                
                if(currentProducts.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted); text-align:center; width:100%;">لا توجد منتجات معروضة حالياً.</p>';
                    return;
                }

                currentProducts.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card">
                            <span class="badge">${p.category || 'ملحقات'}</span>
                            <img src="${p.image_url || '/static/css/logo.png.jpeg'}" onerror="this.src='/static/css/logo.png.jpeg'">
                            <h3 style="color:#fff; font-size:16px; margin:10px 0 5px 0;">${p.name}</h3>
                            <div style="color:var(--primary); font-weight:bold; margin-bottom:12px;">${p.selling_price} ج.م</div>
                            <div style="display:flex; gap:5px;">
                                <button class="btn-primary" onclick="addToCart(${p.id})" style="margin-top:0; font-size:12px; padding:8px;">🛒 أضف للسلة</button>
                                <button class="btn-primary" onclick="window.location.href='/product_detail.html?id=${p.id}'" style="margin-top:0; font-size:12px; padding:8px; background:#222; color:#fff; border:1px solid #444;">👀 تفاصيل</button>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); }
        }

        function addToCart(id) {
            const prod = currentProducts.find(p => p.id === id);
            if(!prod) return;
            const existing = cart.find(item => item.id === id);
            if(existing) {
                existing.quantity += 1;
            } else {
                cart.push({ id: prod.id, name: prod.name, selling_price: prod.selling_price, quantity: 1, commission: prod.commission });
            }
            localStorage.setItem('sina_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            const countBadge = document.getElementById('cart-count');
            const formContainer = document.getElementById('checkout-form-container');
            
            if(cart.length === 0) {
                list.innerHTML = 'السلة فارغة حالياً.';
                countBadge.innerText = '0 قطع';
                formContainer.style.display = 'none';
                return;
            }

            let totalItems = 0;
            let totalPrice = 0;
            list.innerHTML = '';
            
            cart.forEach((item, index) => {
                totalItems += item.quantity;
                totalPrice += (item.selling_price * item.quantity);
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; background:#111; padding:10px; margin-bottom:8px; border-radius:6px;">
                        <span>📦 ${item.name} (x${item.quantity})</span>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span style="color:var(--primary); font-weight:bold;">${item.selling_price * item.quantity} ج.م</span>
                            <button onclick="removeFromCart(${index})" style="background:none; border:none; color:var(--danger); cursor:pointer;">❌</button>
                        </div>
                    </div>
                `;
            });

            list.innerHTML += `<div style="text-align:left; font-size:16px; color:#fff; font-weight:bold; margin-top:10px;">💰 الإجمالي: <span style="color:var(--primary);">${totalPrice} ج.م</span></div>`;
            countBadge.innerText = `${totalItems} قطع`;
            formContainer.style.display = 'block';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('sina_cart', JSON.stringify(cart));
            updateCartUI();
        }

        document.getElementById('order-submit-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            let totalPrice = cart.reduce((sum, item) => sum + (item.selling_price * item.quantity), 0);
            
            const payload = {
                customer_name: document.getElementById('cust-name').value.trim(),
                customer_phone: document.getElementById('cust-phone').value.trim(),
                customer_address: document.getElementById('cust-address').value.trim(),
                total_price: totalPrice,
                marketer_id: localStorage.getItem('active_marketer_id') || "مباشر بدون كود",
                products: cart,
                status: "قيد المراجعة"
            };

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert('🎉 تم إرسال طلبك وحفظه بنجاح! يمكنك تتبعه برقم هاتفك في أي وقت.');
                    cart = [];
                    localStorage.removeItem('sina_cart');
                    updateCartUI();
                    document.getElementById('order-submit-form').reset();
                }
            } catch(e) { alert('❌ عذراً، فشل إرسال الطلب المزامَن.'); }
        });

        async function trackUserOrder() {
            const phone = document.getElementById('track-phone').value.trim();
            const out = document.getElementById('track-output');
            if(!phone) { alert("أدخل رقم هاتفك أولاً!"); return; }
            out.innerHTML = "🔍 جاري الفحص بالسجلات السحابية...";
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                let myOrders = orders.filter(o => o.customer_phone && o.customer_phone.trim() === phone);
                if(myOrders.length > 0) {
                    let lastOrder = myOrders[0];
                    out.innerHTML = `
                        <div style="background:#111; padding:15px; border-radius:8px; border-right:4px solid var(--primary); margin-top:15px;">
                            <p style="margin:5px 0;">📦 رقم أحدث شحنة: <strong>#${lastOrder.id}</strong></p>
                            <p style="margin:5px 0;">🚦 الحالة: <span style="color:var(--primary); font-weight:bold;">🔄 ${lastOrder.status}</span></p>
                            <p style="margin:5px 0;">💰 إجمالي الحساب: <strong>${lastOrder.total_price} ج.م</strong></p>
                        </div>
                    `;
                } else {
                    out.innerHTML = `<p style="color:var(--danger); text-align:center; margin-top:15px;">❌ لم نجد أي طلبات مسجلة بهذا الرقم.</p>`;
                }
            } catch(e) { out.innerHTML = "❌ فشل جلب بيانات التتبع."; }
        }
    </script>
</body>
</html>
