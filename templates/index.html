<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sina 401 | متجر سينا لملحقات الموبايل</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="toast" id="toast-notification"></div>

    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div class="nav-links">
            <a href="/">الرئيسية</a>
            <a href="/marketers.html">بوابة المسوقين</a>
            <a href="/login.html">🔐 لوحة الإدارة</a>
        </div>
    </header>

    <div class="hero-banner">
        <h2>👑 الفخامة والتميز في مكان واحد</h2>
        <p>اكتشف أقوى العروض وملحقات الهواتف بضمان سينا ستور الأصلي</p>
    </div>

    <div class="controls-row" style="max-width:1000px; margin:20px auto; padding:0 20px; display:flex; gap:10px;">
        <input type="text" id="search-box" class="search-input" placeholder="ابحث عن منتجك المفضل..." oninput="loadStoreProducts()" style="flex:1; padding:12px; background:#141414; border:1px solid #333; color:white; border-radius:8px;">
    </div>

    <div class="products-grid" id="products-container" style="max-width:1000px; margin:30px auto; display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; padding:0 20px;">
        <p style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">جاري تحميل المنتجات من المخزن السحابي...</p>
    </div>

    <div style="max-width: 500px; margin: 40px auto; padding: 20px; background:var(--card-bg); border-radius:12px; border:1px solid #222;">
        <h3 style="color:var(--primary); text-align:center; margin-top:0; margin-bottom:15px;">📦 تتبع حالة شحنتك فوراً</h3>
        <div style="display:flex; gap:10px;">
            <input type="tel" id="track-phone" class="search-input" style="flex:1; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:6px;" placeholder="رقم الهاتف المسجل بالطلب...">
            <button class="btn-primary" style="width:auto; margin:0; padding:0 20px;" onclick="trackMyOrder()">تتبع الشحنة</button>
        </div>
        <div id="track-output"></div>
    </div>

    <a href="https://wa.me/201065653401" class="floating-whatsapp" target="_blank">💬</a>

    <script>
        async function loadStoreProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const container = document.getElementById('products-container');
                container.innerHTML = '';
                
                const searchTxt = document.getElementById('search-box').value.toLowerCase();
                
                let filtered = products.filter(p => p.name.toLowerCase().includes(searchTxt));

                if (filtered.length === 0) {
                    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#aaa;">لم نجد منتجات تطابق البحث الحالي.</p>`;
                    return;
                }

                filtered.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card" style="background:#141414; border:1px solid var(--card-border); border-radius:12px; overflow:hidden; position:relative; display:flex; flex-direction:column;">
                            <span class="stock-badge">📦 المتاح: ${p.stock_quantity || 0}</span>
                            <img src="${p.image_url || '/static/css/logo.png.jpeg'}" style="width:100%; height:220px; object-fit:cover;">
                            <div class="card-body" style="padding:15px; flex-grow:1; display:flex; flex-direction:column; justify-content:between;">
                                <h3 style="margin:0 0 10px 0; font-size:18px;"><a href="/product_detail.html?id=${p.id}" style="color:#fff; text-decoration:none;">${p.name}</a></h3>
                                <p style="color:#aaa; font-size:13px; flex-grow:1;">${p.description || ''}</p>
                                <div class="price-box" style="font-size:18px; color:var(--primary); font-weight:bold; margin-top:10px;">${p.selling_price} ج.م</div>
                                <button class="btn-primary" onclick="window.location.href='https://wa.me/201065653401?text=أريد طلب منتج: ${p.name}'" style="margin-top:10px;">شراء عبر واتساب 💬</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('products-container').innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: red;">❌ فشل الاتصال بالمخزن السحابي.</p>`;
            }
        }

        async function trackMyOrder() {
            const phoneInput = document.getElementById('track-phone').value.trim();
            const out = document.getElementById('track-output');
            if(!phoneInput) { alert("من فضلك أدخل رقم الهاتف المسجل به الطلب"); return; }
            
            out.innerHTML = "🔍 جاري البحث في السجلات المزامنة...";
            try {
                const res = await fetch('/api/public/orders');
                const orders = await res.json();
                
                let myOrder = orders.find(o => o.customer_phone && o.customer_phone.trim() === phoneInput);
                
                if(myOrder) {
                    let displayTotal = myOrder.total_price ? myOrder.total_price : (myOrder.total_val ? myOrder.total_val : 0);
                    out.innerHTML = `
                        <div style="background:#111; padding:15px; border-radius:8px; border-right:4px solid var(--primary); margin-top:15px; text-align:right;">
                            <p style="margin:5px 0;">📦 رقم الشحنة: <strong>#${myOrder.id}</strong></p>
                            <p style="margin:5px 0;">🚦 حالة الطلب: <span style="color:var(--primary); font-weight:bold;">🔄 ${myOrder.status || 'قيد المراجعة'}</span></p>
                            <p style="margin:5px 0;">💰 إجمالي الحساب: <strong>${displayTotal} ج.م</strong></p>
                        </div>
                    `;
                } else {
                    out.innerHTML = `<p style="color:#ef4444; text-align:center; margin-top:15px;">❌ لم نجد أي طلبات شحن مسجلة بهذا الرقم.</p>`;
                }
            } catch(e) {
                out.innerHTML = `<p style="color:#ef4444; text-align:center; margin-top:15px;">❌ خطأ في سحب بيانات التتبع.</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadStoreProducts);
    </script>
</body>
</html>
