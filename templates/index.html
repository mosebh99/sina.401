<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sina Store 401 | عالم الهواتف الذكية</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* تنسيقات مخصصة لتجربة مستخدم سلسة وسريعة */
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }
        
        /* سلة التسوق الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: #141414;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(212, 175, 55, 0.15);
        }
        .cart-sidebar.open { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid rgba(212,175,55,0.1); display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #222; align-items: center; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #333; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 14px; margin-bottom: 5px; color: #fff; }
        .cart-item-info .price { color: #d4af37; font-weight: bold; }
        .cart-footer { padding: 20px; border-top: 1px solid rgba(212,175,55,0.1); background: #1a1a1a; }
        
        /* شريط الفلترة والتصنيفات */
        .category-filter { display: flex; justify-content: center; gap: 10px; margin: 25px 0; flex-wrap: wrap; }
        .filter-btn { background: #141414; color: #fff; border: 1px solid #333; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: #d4af37; color: #0a0a0a; border-color: #d4af37; font-weight: bold; }

        /* تتبع الطلبات */
        .track-section { background: #141414; padding: 20px; border-radius: 12px; margin: 30px auto; max-width: 500px; border: 1px solid rgba(212,175,55,0.1); }
        .track-input-group { display: flex; gap: 10px; margin-top: 15px; }
        .track-input-group input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #202020; color: white; }
        .track-input-group button { background: #d4af37; color: #000; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* حاوية التوستر */
        #toast-container { position: fixed; top: 20px; left: 20px; z-index: 9999; }
    </style>
</head>
<body>

    <header style="background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); position: sticky; top:0; z-index:1000; padding: 15px 5%;">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <div class="logo" style="font-size: 24px; font-weight: 800; color: #d4af37; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-mobile-alt"></i> Sina Store 401
            </div>
            
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="#track-orders-anchor" style="color: #999; text-decoration: none; font-size: 14px;"><i class="fas fa-box"></i> تتبع طلبك</a>
                <div style="position: relative; cursor: pointer;" onclick="toggleCart(true)">
                    <i class="fas fa-shopping-bag" style="font-size: 24px; color: #d4af37;"></i>
                    <span id="cart-badge" style="position: absolute; top: -8px; right: -10px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold;">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero" style="text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.7), #0a0a0a), url('/static/css/logo.png.jpeg') center/cover; border-bottom: 1px solid rgba(212,175,55,0.15);">
        <h2 style="font-size: 32px; color: #d4af37; margin-bottom: 15px;">الوجهة الأولى لأحدث الهواتف الذكية والأجهزة اللوحية</h2>
        <p style="color: #999; max-width: 600px; margin: 0 auto; font-size: 16px;">تصفح تشكيلتنا المتميزة من أرقى الماركات العالمية بضمان حقيقي وأفضل الأسعار في السوق المصري.</p>
    </section>

    <div class="container">
        <div class="category-filter">
            <button class="filter-btn active" onclick="filterProducts('كل الأجهزة', this)">كل الأجهزة</button>
            <button class="filter-btn" onclick="filterProducts('هواتف ذكية', this)">هواتف ذكية</button>
            <button class="filter-btn" onclick="filterProducts('أجهزة لوحية', this)">أجهزة لوحية</button
