<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة أرباح شركاء النجاح | Sina 401</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        .card-stat { background: #111; border-top: 3px solid #d4af37; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .table-wrap { max-width: 1000px; margin: 30px auto; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid #222; }
        th { color:#d4af37;}
    </style>
</head>
<body>
    <header style="background:#141414; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;">
        <h1 style="color:#d4af37; margin:0;" id="welcome-msg">📊 بوابة المسوقين</h1>
        <div class="nav-links"><a href="/api/auth/logout" style="color:red; text-decoration:none; font-weight:bold;">🚪 تسجيل الخروج</a></div>
    </header>

    <div style="max-width:1000px; margin:30px auto; padding:0 20px;">
        <h2 style="color:#d4af37;" id="code-badge">كودك الحالي: جاري التحميل...</h2>
        
        <div class="grid-3">
            <div class="card-stat">
                <h3 style="color:#aaa; margin:0;">📈 إجمالي الشحنات</h3>
                <h2 id="m-count" style="margin:10px 0 0 0; color:#fff;">0 طلب</h2>
            </div>
            <div class="card-stat">
                <h3 style="color:#aaa; margin:0;">💰 مبيعات تم تسليمها</h3>
                <h2 id="m-total-sales" style="margin:10px 0 0 0; color:#fff;">0 ج.م</h2>
            </div>
            <div class="card-stat">
                <h3 style="color: #22c55e; margin:0;">💵 أرباحك الجاهزة</h3>
                <h2 id="m-commission" style="margin:10px 0 0 0; color:#22c55e;">0 ج.م</h2>
            </div>
        </div>

        <div class="table-wrap">
            <h3 style="color:#d4af37; margin-top:0;">📋 سجل تتبع شحناتك المباشر</h3>
            <table>
                <thead>
                    <tr>
                        <th>رقم الطلب</th>
                        <th>اسم العميل</th>
                        <th>إجمالي الحساب</th>
                        <th>حالة الشحن</th>
                    </tr>
                </thead>
                <tbody id="marketer-orders-rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadMarketerDashboard() {
            const sRes = await fetch('/api/auth/session');
            const user = await sRes.json();
            if(!user) { window.location.href='/login.html'; return; }
            
            document.getElementById('welcome-msg').innerText = `📊 شاشة الشريك الفخم: ${user.fullname}`;
            document.getElementById('code-badge').innerText = `🏆 كود التسويق النشط: ${user.marketer_code}`;
            
            const oRes = await fetch('/api/orders');
            const orders = await oRes.json();
            const pRes = await fetch('/api/products');
            const prods = await pRes.json();
            
            // فلترة الطلبات التابعة لكود هذا المسوق فقط!
            let myOrders = orders.filter(o => o.marketer_id === user.marketer_code);
            
            let totalSalesSum = 0;
            let totalComm = 0;
            const tbody = document.getElementById('marketer-orders-rows');
            tbody.innerHTML = '';
            
            myOrders.forEach(o => {
                if(o.status === 'تم التوصيل') {
                    totalSalesSum += o.total_price;
                    // احتساب العمولات الفعلية ديناميكياً من جدول المنتجات
                    if(o.products_json){
                        try {
                            let items = JSON.parse(o.products_json);
                            items.forEach(it => {
                                let match = prods.find(p => p.name === it.name);
                                if(match) { totalComm += (match.commission * it.qty); }
                            });
                        } catch(e){}
                    }
                }
                
                tbody.innerHTML += `
                    <tr>
                        <td>#${o.id}</td>
                        <td>${o.customer_name}</td>
                        <td style="color:#d4af37; font-weight:bold;">${o.total_price} ج.م</td>
                        <td><span style="color:${o.status==='تم التوصيل'?'#22c55e':'#ffaa00'}; font-weight:bold;">🔄 ${o.status}</span></td>
                    </tr>
                `;
            });
            
            document.getElementById('m-count').innerText = `${myOrders.length} طلب`;
            document.getElementById('m-total-sales').innerText = `${totalSalesSum} ج.م`;
            document.getElementById('m-commission').innerText = `${totalComm} ج.م`;
        }
        
        window.addEventListener('DOMContentLoaded', loadMarketerDashboard);
    </script>
</body>
</html>
