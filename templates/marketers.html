<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة عمولات المسوقين | Sina 401</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card-stat { background: var(--card-bg); border-top: 3px solid var(--primary); padding: 20px; border-radius: 10px; text-align: center; }
        .table-wrap { max-width: 1000px; margin: 30px auto; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div class="nav-links"><a href="/">⬅️ عودة للمتجر الرئيسي</a></div>
    </header>

    <div style="max-width: 500px; margin: 30px auto; padding: 0 20px; text-align: center;">
        <h3 style="color: var(--primary);">📊 استعلام كود وعمولات المسوق</h3>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="m-code-input" class="search-input" style="flex: 1;" placeholder="أدخل كود التسويق الخاص بك...">
            <button class="btn-primary" style="width: auto; margin: 0; padding: 0 20px;" onclick="loadMarketerReport()">عرض التقارير</button>
        </div>
    </div>

    <div class="grid-3">
        <div class="card-stat"><h3>عدد مبيعاتك</h3><div id="m-count" style="font-size:24px; color:var(--primary); font-weight:bold;">0 طلب</div></div>
        <div class="card-stat"><h3>إجمالي تدفقات مبيعاتك</h3><div id="m-total-sales" style="font-size:24px; color:var(--primary); font-weight:bold;">0 ج.م</div></div>
        <div class="card-stat"><h3>أرباح عمولتك الحالية</h3><div id="m-commission" style="font-size:24px; color:#22c55e; font-weight:bold;">0 ج.م</div></div>
    </div>

    <div class="table-wrap">
        <h3 style="color: var(--primary); margin-top:0;">📋 سجل الشحنات والطلبات المسجلة بكودك</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>رقم الطلب</th>
                        <th>اسم العميل</th>
                        <th>الحساب الإجمالي</th>
                        <th>حالة الشحن الحالية</th>
                    </tr>
                </thead>
                <tbody id="marketer-rows">
                    <tr><td colspan="4" style="text-align: center; color: var(--text-muted);">ادخل كودك واضغط عرض التقارير لاستخراج البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadMarketerReport() {
            const code = document.getElementById('m-code-input').value.trim();
            if(!code) { alert("من فضلك أدخل كود التسويق أولاً"); return; }
            
            try {
                const res = await fetch('/api/public/orders');
                const orders = await res.json();
                
                // فلترة الطلبات التي تنتمي لهذا المسوق
                let myOrders = orders.filter(o => o.marketer_id && o.marketer_id.trim() === code);
                
                const tbody = document.getElementById('marketer-rows');
                tbody.innerHTML = '';
                
                let totalSalesSum = 0;
                
                if(myOrders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#aaa;">لا توجد مبيعات مسجلة بهذا الكود حالياً.</td></tr>`;
                } else {
                    myOrders.forEach(o => {
                        totalSalesSum += o.total_price;
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>#${o.id}</strong></td>
                                <td>${o.customer_name || 'عميل المتجر'}</td>
                                <td style="color:var(--primary); font-weight:bold;">${o.total_price} ج.م</td>
                                <td style="color:var(--primary); font-weight:bold;">🔄 ${o.status}</td>
                            </tr>
                        `;
                    });
                }
                
                document.getElementById('m-count').innerText = `${myOrders.length} طلب`;
                document.getElementById('m-total-sales').innerText = `${totalSalesSum} ج.م`;
                // احتساب العمولة الافتراضية الثابتة 10% من إجمالي قيمة المبيعات
                document.getElementById('m-commission').innerText = `${Math.round(totalSalesSum * 0.10)} ج.م`;
                
            } catch(e) {
                alert("خطأ في الاتصال بالخادم.");
            }
        }
    </script>
</body>
</html>
