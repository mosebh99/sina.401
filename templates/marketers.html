<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المسوقين والعمولات | Sina 401</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/">📊 بوابة المسوقين بالعمولة</a></h1>
        <div class="nav-links"><a href="/">⬅️ العودة للمتجر</a></div>
    </header>

    <div style="max-width: 600px; margin: 50px auto; padding: 30px; background: var(--card-bg); border-radius: 12px; border: 1px solid #222;">
        <h2 style="color: var(--primary); margin-top: 0; text-align: center;">💰 نظام تتبع المبيعات والعمولات</h2>
        <p style="color: var(--text-muted); text-align: center; font-size: 14px;">أهلاً بك في نظام شركاء النجاح لـ Sina 401. يمكنك متابعة طلبات عملائك وعمولاتك الحقيقية بدقة.</p>
        
        <div style="margin-top: 30px; padding: 20px; background: #141414; border-radius: 8px; border-right: 4px solid var(--primary);">
            <label style="color:#fff; display:block; margin-bottom:10px; font-weight:bold;">اكتب كود التسويق الخاص بك:</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="m-code" class="search-input" placeholder="مثال: Sina01..." style="flex:1;">
                <button class="btn-primary" onclick="checkMarketerEarnings()" style="width:auto; margin-top:0; padding:0 25px;">تحليل الأرباح</button>
            </div>
        </div>

        <div id="marketer-report" style="margin-top:25px;"></div>
    </div>

    <script>
        // التقاط الكود من الرابط وتعبئته تلقائياً عند الدخول
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mCode = urlParams.get('m') || localStorage.getItem('active_marketer_id');
            if(mCode) {
                const codeInput = document.getElementById('m-code');
                if(codeInput) {
                    codeInput.value = mCode;
                    checkMarketerEarnings();
                }
            }
        });

        async function checkMarketerEarnings() {
            const code = document.getElementById('m-code').value.trim();
            if(!code) { alert("من فضلك اكتب كودك أولاً!"); return; }
            document.getElementById('marketer-report').innerText = "⏳ جاري تشغيل خوارزمية جرد وحساب عمولاتك الحية...";
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                
                // جلب الشحنات الخاصة بالمسوق فقط
                let myOrders = orders.filter(o => o.marketer_id && o.marketer_id.trim() === code);
                let totalComm = 0;
                let deliveredCount = 0;

                myOrders.forEach(o => {
                    if (o.status === 'تم التسليم') {
                        deliveredCount++;
                    }
                    
                    // قراءة المنتجات لحساب عمولة كل منتج تم بيعه بدقة
                    try {
                        let products = typeof o.products_json === 'string' ? JSON.parse(o.products_json) : o.products_json;
                        if (Array.isArray(products)) {
                            products.forEach(p => {
                                // استخدام عمولة المنتج المحددة بالمخزن أو 10% افتراضي إن لم توجد
                                totalComm += (Number(p.commission) || (Number(p.selling_price) * 0.10)) * (p.quantity || 1);
                            });
                        } else {
                            totalComm += ((o.total_price || 0) * 0.10);
                        }
                    } catch(e) {
                        totalComm += ((o.total_price || 0) * 0.10);
                    }
                });

                document.getElementById('marketer-report').innerHTML = `
                    <div style="background:#111; padding:20px; border-radius:8px; border:1px solid var(--primary); color:#fff; text-align:right; display:flex; flex-direction:column; gap:10px;">
                        <p style="margin:0;">📊 إجمالي الطلبات المسجلة باسمك: <span style="color:var(--primary); font-weight:bold;">${myOrders.length} طلب</span></p>
                        <p style="margin:0;">✅ شحنات ناجحة تم تسليمها للعميل: <span style="color:#22c55e; font-weight:bold;">${deliveredCount} طلب</span></p>
                        <hr style="border:none; border-top:1px solid #222; margin:5px 0;">
                        <p style="margin:0; font-size:16px;">💰 العمولات المستحقة (الحقيقية والتقديرية): <span style="color:#22c55e; font-weight:bold; font-size:20px;">${Math.round(totalComm)} ج.م</span></p>
                    </div>
                `;
            } catch(e) { 
                document.getElementById('marketer-report').innerText = "❌ حدث خطأ في المزامنة السحابية للسجل."; 
            }
        }
    </script>
</body>
</html>
