<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات المسوقين | سينا ستور</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        header {
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links a {
            color: #888;
            font-size: 14px;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #d4af37; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .search-card {
            background: #161616;
            border: 1px solid rgba(212,175,55,0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        .search-card h2 {
            color: #d4af37;
            margin-top: 0;
            font-size: 22px;
        }
        .search-card p {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .search-input-group {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }
        .search-input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            padding: 12px 16px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
        }
        .search-input:focus {
            outline: none;
            border-color: #d4af37;
        }
        .search-btn {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            background: #111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
            text-align: center;
        }
        .stat-box .number {
            font-size: 28px;
            font-weight: bold;
            color: #d4af37;
        }
        .stat-box .label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .orders-table th, .orders-table td {
            padding: 12px;
            border-bottom: 1px solid #222;
            text-align: right;
        }
        .orders-table th {
            background: #111;
            color: #d4af37;
            font-size: 13px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-shipping { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-delivered { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-returned { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .login-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(184,134,11,0.05));
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 8px;
            color: #d4af37;
            text-decoration: none;
            transition: all 0.3s;
        }
        .login-link:hover {
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(184,134,11,0.1));
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">✨ سينا ستور</div>
        <div class="nav-links"><a href="/">⬅️ العودة للمتجر</a></div>
    </header>

    <div class="container">
        <div class="search-card">
            <h2>📊 إحصائيات المسوقين</h2>
            <p>أدخل كود المسوق لمتابعة أرباحه وطلباته</p>

            <div class="search-input-group">
                <input type="text" id="marketer-code-input" class="search-input" placeholder="أدخل كود المسوق...">
                <button class="search-btn" onclick="loadMarketerData()">بحث</button>
            </div>

            <a href="/marketer_login.html" class="login-link">
                🔐 هل أنت مسوق؟ سجل دخولك من هنا
            </a>
        </div>

        <div id="marketer-stats" style="display: none;">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="number" id="stat-orders">0</div>
                    <div class="label">إجمالي الطلبات</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-sales">0</div>
                    <div class="label">إجمالي المبيعات (ج.م)</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-commission">0</div>
                    <div class="label">العمولة المتوقعة (ج.م)</div>
                </div>
            </div>

            <h3 style="color: #d4af37; margin-top: 30px;">📋 الطلبات المسجلة</h3>
            <div style="overflow-x: auto;">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>العميل</th>
                            <th>الهاتف</th>
                            <th>المبلغ</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="marketer-orders-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadMarketerData() {
            const code = document.getElementById('marketer-code-input').value.trim();
            if (!code) { alert('من فضلك أدخل كود المسوق'); return; }

            try {
                const res = await fetch(`/api/marketers/stats/${code}`);
                const data = await res.json();

                if (data.error) {
                    alert('❌ ' + data.error);
                    return;
                }

                document.getElementById('marketer-stats').style.display = 'block';
                document.getElementById('stat-orders').innerText = data.stats.total_orders || 0;
                document.getElementById('stat-sales').innerText = (data.stats.total_sales || 0).toFixed(2);
                document.getElementById('stat-commission').innerText = (data.total_commission || 0).toFixed(2);

                const tbody = document.getElementById('marketer-orders-body');
                tbody.innerHTML = '';

                if (!data.orders || data.orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#aaa;">لا توجد طلبات مسجلة</td></tr>';
                    return;
                }

                data.orders.forEach(o => {
                    let statusClass = 'status-pending';
                    let statusText = '⏳ قيد المراجعة';
                    if (o.status === 'جاري الشحن') { statusClass = 'status-shipping'; statusText = '🚚 جاري الشحن'; }
                    else if (o.status === 'تم التسليم') { statusClass = 'status-delivered'; statusText = '✅ تم التسليم'; }
                    else if (o.status === 'مرتجع') { statusClass = 'status-returned'; statusText = '❌ مرتجع'; }

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>#${o.id}</strong></td>
                            <td>${o.customer_name || '-'}</td>
                            <td>${o.customer_phone || '-'}</td>
                            <td style="color: #d4af37; font-weight: bold;">${o.total_price || 0} ج.م</td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td style="color: #888; font-size: 12px;">${o.created_at ? new Date(o.created_at).toLocaleDateString('ar-EG') : '-'}</td>
                        </tr>
                    `;
                });
            } catch (e) {
                alert('❌ فشل الاتصال بالسيرفر');
            }
        }
    </script>
</body>
</html>
