<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الإدارة | سينا ستور 401</title>
    <style>
        :root {
            --primary: #d4af37;
            --primary-hover: #b8860b;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --border-gold: rgba(212, 175, 55, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-container { max-width: 400px; width: 100%; background: var(--bg-card); border: 1px solid var(--border-gold); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); text-align: center; }
        .logo { font-size: 26px; font-weight: bold; color: var(--primary); text-decoration: none; display: block; margin-bottom: 25px; }
        h3 { margin-bottom: 20px; color: #eee; }
        label { display: block; text-align: right; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 16px; text-align: center; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-hover)); border: none; border-radius: 6px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: opacity 0.3s; }
        button:hover { opacity: 0.9; }
        .err-msg { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="/" class="logo">✨ سينا ستور 401</a>
        <h3>🔒 تسجيل دخول لوحة الكنترول</h3>
        
        <div id="error-div" class="err-msg"></div>

        <form id="admin-login-form">
            <label>اسم المستخدم الإداري:</label>
            <input type="text" id="adm-user" required placeholder="مثال: admin">

            <label>كلمة المرور السرية:</label>
            <input type="password" id="adm-pass" required placeholder="••••••••">

            <button type="submit">دخول لوحة التحكم</button>
        </form>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('adm-user').value.trim();
            const password = document.getElementById('adm-pass').value;
            const errDiv = document.getElementById('error-div');
            
            errDiv.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = '/cashier.html';
                } else {
                    errDiv.innerText = data.message || 'بيانات الدخول الإدارية غير صحيحة.';
                    errDiv.style.display = 'block';
                }
            } catch(err) {
                errDiv.innerText = 'خطأ اتصال بالسيرفر.';
                errDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
