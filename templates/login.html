<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-wrapper" style="max-width: 400px; margin: 100px auto; padding: 20px; background: #1e1e1e; border-radius: 8px; text-align: center;">
        <img src="/static/css/logo.png.jpeg" alt="Logo" style="width: 80px; border-radius: 50%; margin-bottom: 15px;">
        <h2>🔐 تسجيل دخول الإدارة</h2>
        <form style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
            <input type="text" placeholder="اسم المستخدم" style="padding: 10px; background: #111; color: white; border: 1px solid #333; border-radius: 4px;">
            <input type="password" placeholder="كلمة المرور" style="padding: 10px; background: #111; color: white; border: 1px solid #333; border-radius: 4px;">
            <button type="button" class="btn-primary" onclick="window.location.href='/cashier.html'" style="padding: 10px;">دخول آمن</button>
        </form>
    </div>

    <script src="/static/js/store.js"></script>
</body>
</html>
