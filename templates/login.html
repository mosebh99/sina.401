<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول الإداري | Sina 401</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/">✨ لوحة التحكم الموحدة</a></h1>
        <div class="nav-links"><a href="/">⬅️ العودة للمتجر</a></div>
    </header>

    <div style="max-width: 400px; margin: 80px auto; padding: 30px; background: var(--card-bg); border-radius: 12px; border: 1px solid #222; text-align: center;">
        <h2 style="color: var(--primary); margin-top: 0;">🔐 نظام تسجيل الدخول</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">قم بإدخال بيانات الاعتماد المخصصة لإدارة المتجر</p>
        
        <form id="admin-login-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="adm-user" class="search-input" placeholder="اسم المستخدم أو الكود..." required style="width:100%;">
            <input type="password" id="adm-pass" class="search-input" placeholder="كلمة المرور السرية..." required style="width:100%;">
            <button type="submit" class="btn-primary" style="margin-top:10px;">تحقق آمن وعبور للكاشير</button>
        </form>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('adm-user').value.trim();
            const pass = document.getElementById('adm-pass').value.trim();

            // التحقق والعبور الفوري والآمن
            if(user === "admin" && pass === "MoSebA01065653401") {
                alert("✅ تم التحقق بنجاح! جاري الانتقال للوحة التحكم...");
                window.location.href = '/cashier.html';
            } else {
                alert("❌ اسم المستخدم أو كلمة المرور غير صحيحة!");
            }
        });
    </script>
</body>
</html>
