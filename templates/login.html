<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول الإداري | Sina 401</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container { max-width: 420px; margin: 80px auto; padding: 40px 30px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--card-border); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .login-container h2 { color: var(--primary); margin-top: 0; font-size: 24px; }
        .login-container p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        .login-form { display: flex; flex-direction: column; gap: 15px; }
        .input-group { position: relative; }
        .input-group input { width: 100%; padding: 14px 18px; background: #111; border: 1px solid #222; border-radius: 10px; color: #fff; font-family: inherit; font-size: 15px; transition: all 0.3s; }
        .input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(212, 175, 55, 0.15); }
        .input-group label { display: block; text-align: right; margin-bottom: 6px; color: var(--text-muted); font-size: 13px; }
        .login-btn { background: var(--primary-gradient); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .login-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }
        .success-msg { color: #22c55e; font-size: 13px; margin-top: 10px; display: none; }
        .back-link { display: inline-block; margin-top: 20px; color: var(--text-muted); font-size: 14px; transition: color 0.3s; }
        .back-link:hover { color: var(--primary); }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--primary); }
    </style>
<base target="_blank">
</head>
<body>
    <header>
        <h1><a href="/">✨ Sina 401</a></h1>
        <div class="nav-links"><a href="/">⬅️ العودة للمتجر</a></div>
    </header>

    <div class="login-container">
        <img src="/static/css/logo.png.jpeg" alt="Sina 401" class="logo-img" onerror="this.style.display='none'">
        <h2>🔐 نظام تسجيل الدخول</h2>
        <p>قم بإدخال بيانات الاعتماد المخصصة لإدارة المتجر</p>

        <form id="admin-login-form" class="login-form">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="adm-user" placeholder="أدخل اسم المستخدم..." required autocomplete="username">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="adm-pass" placeholder="أدخل كلمة المرور..." required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="login-btn">تحقق آمن وعبور للكاشير</button>
            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>
        </form>

        <a href="/" class="back-link">⬅️ العودة للمتجر الرئيسي</a>
    </div>

    <script>
        // التحقق من حالة تسجيل الدخول عند تحميل الصفحة
        async function checkLoginStatus() {
            try {
                const res = await fetch('/api/auth/check');
                const data = await res.json();
                if (data.authenticated) {
                    window.location.href = '/cashier.html';
                }
            } catch (e) {}
        }
        checkLoginStatus();

        document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const user = document.getElementById('adm-user').value.trim();
            const pass = document.getElementById('adm-pass').value.trim();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');
            const successDiv = document.getElementById('success-msg');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'جاري التحقق...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (data.success) {
                    successDiv.innerText = '✅ ' + data.message + ' جاري التوجيه...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/cashier.html';
                    }, 1000);
                } else {
                    errorDiv.innerText = '❌ ' + (data.message || 'بيانات الدخول غير صحيحة');
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'تحقق آمن وعبور للكاشير';
                }
            } catch (err) {
                errorDiv.innerText = '❌ فشل الاتصال بالسيرفر';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'تحقق آمن وعبور للكاشير';
            }
        });
    </script>
</body>
</html>
