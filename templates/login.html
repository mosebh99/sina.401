<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الحسابات الموحدة | سينا ستور</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #070707; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; padding: 20px; box-sizing: border-box; }
        .login-box { background: #111; padding: 30px; border-radius: 16px; border: 1px solid #d4af37; text-align: center; width: 100%; max-width: 430px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #1f1f1f; color: white; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #d4af37; color: black; border-color: #d4af37; }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        .input-field { width: 100%; padding: 12px; background: #1c1c1c; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .input-field:focus { border-color: #d4af37; outline: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="color: #d4af37; margin-top: 0; margin-bottom: 20px;">👑 بوابة Sina Store 401</h2>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">إنشاء حساب مسوق</button>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="login-username" class="input-field" placeholder="ادخل اسم المستخدم السري..." required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="login-pass" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="margin-top:10px;">دخول آمن للمنظومة 🔐</button>
        </form>

        <form id="register-form" onsubmit="handleRegister(event)" style="display: none;">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="reg-fullname" class="input-field" placeholder="الاسم الثلاثي..." required>
            </div>
            <div class="form-group">
                <label>اسم مستخدم فريد (بالإنجليزي)</label>
                <input type="text" id="reg-username" class="input-field" placeholder="مثال: ahmed_sina" required>
            </div>
            <div class="form-group">
                <label>رقم الهاتف (واتساب)</label>
                <input type="tel" id="reg-phone" class="input-field" placeholder="010xxxxxxxx" required>
            </div>
            <div class="form-group">
                <label>المحافظة / العنوان</label>
                <input type="text" id="reg-address" class="input-field" placeholder="ادخل عنوانك بالتفصيل..." required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="reg-pass" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="margin-top:10px;">إرسال طلب انضمام سحابي 🤝</button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            if(type === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('register-form').style.display = 'block';
                document.getElementById('login-form').style.display = 'none';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const payload = {
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-pass').value
            };
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(res.ok) {
                alert("✅ تم التحقق والعبور بنجاح للمنظومة!");
                window.location.href = data.redirect;
            } else {
                alert("❌ خطأ: " + data.error);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const payload = {
                fullname: document.getElementById('reg-fullname').value,
                username: document.getElementById('reg-username').value,
                phone: document.getElementById('reg-phone').value,
                address: document.getElementById('reg-address').value,
                password: document.getElementById('reg-pass').value
            };
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(res.ok) {
                alert("🎉 " + data.message);
                switchTab('login');
            } else {
                alert("❌ فشل التسجيل: " + data.error);
            }
        }
    </script>
</body>
</html>
