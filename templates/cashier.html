<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | سينا ستور</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        header {
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info {
            color: #888;
            font-size: 13px;
        }
        .user-info span {
            color: #d4af37;
            font-weight: bold;
        }
        .logout-btn {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: inherit;
        }
        .logout-btn:hover { background: #dc2626; }
        .nav-links a {
            color: #888;
            font-size: 14px;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #d4af37; }

        .admin-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #111;
            border: 1px solid #333;
            color: #aaa;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000;
            border-color: #d4af37;
        }
        .tab-content {
            display: none;
            background: #161616;
            border: 1px solid rgba(212,175,55,0.1);
            padding: 25px;
            border-radius: 12px;
        }
        .tab-content.active { display: block; }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            text-align: right;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            border-bottom: 1px solid #222;
        }
        .admin-table th {
            background: #111;
            color: #d4af37;
            font-size: 13px;
        }
        .admin-table tr:hover { background: rgba(255,255,255,0.02); }
        .admin-table td { font-size: 14px; }
        .status-select {
            background: #111;
            color: #fff;
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .upload-zone {
            border: 2px dashed #333;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            background: #111;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-zone:hover { border-color: #d4af37; }
        .preview-img-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .preview-img-container img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #d4af37;
        }

        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .icon { font-size: 30px; margin-bottom: 10px; }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #d4af37;
        }
        .stat-card .label {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }

        .chart-container {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .chart-bar {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }
        .chart-bar-label {
            width: 120px;
            font-size: 13px;
            color: #888;
        }
        .chart-bar-fill {
            height: 24px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border-radius: 4px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #000;
        }
        .chart-bar-bg {
            flex: 1;
            background: #222;
            border-radius: 4px;
            margin-left: 10px;
        }

        .search-input {
            background: #111;
            border: 1px solid #333;
            padding: 12px 16px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            width: 100%;
            transition: all 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-danger:hover { background: #dc2626; }
