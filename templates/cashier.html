<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المطورة | Sina Store</title>
    <link rel="icon" type="image/png" href="/static/css/logo.png.jpeg">
    <style>
        :root { --primary: #d4af37; --bg: #0d0d0d; --card-bg: #141414; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1, h2 { color: var(--primary); text-align: center; }
        .form-box { background: var(--card-bg); border: 1px solid var(--primary); padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        .full-width { grid-column: span 2; }
        label { margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input, select, textarea { padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; font-family: inherit; }
        .btn-submit { background: var(--primary); color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #f3e5ab; }
        .product-item { background: #141414; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ لوحة الإدارة والجرد الشاملة</h1>
        
        <div class="form-box">
            <h2>📦 إضافة منتج جديد للسحابة</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label>اسم المنتج الفاخر</label>
                        <input type="text" id="p-name" required placeholder="مثال: سماعة بلوتوث P9 Pro">
                    </div>
                    <div class="form-group">
                        <label>القسم</label>
                        <select id="p-category">
                            <option value="إكسسوارات موبايل">إكسسوارات موبايل</option>
                            <option value="شواحن وكابلات">شواحن وكابلات</option>
                            <option value="سماعات">سماعات</option>
                            <option value="عام">عام</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>سعر البيع للجمهور (ج.م)</label>
                        <input type="number" step="0.01" id="p-price" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>سعر الشراء / التكلفة (ج.م)</label>
                        <input type="number" step="0.01" id="p-purchasing" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>عمولة المسوق الثابتة (ج.م)</label>
                        <input type="number" step="0.01" id="p-commission" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>الكمية المتاحة بالمخزن</label>
                        <input type="number" id="p-stock" required placeholder="0">
                    </div>
                    <div class="form-group full-width">
                        <label>رابط صورة المنتج</label>
                        <input type="url" id="p-img" placeholder="https://example.com/image.jpg">
                    </div>
                    <div class="form-group full-width">
                        <label>وصف وتفاصيل المنتج</label>
                        <textarea id="p-desc" rows="3" placeholder="اكتب مواصفات المنتج هنا..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-submit full-width">🚀 حفظ وتثبيت المنتج وتحديث المخزن</button>
            </form>
        </div>

        <h2>📦 المنتجات الحالية في المخزن السحابي</h2>
        <div id="products-list"></div>
    </div>

    <script>
        async function loadProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            
            products.forEach(p => {
                list.innerHTML += `
                    <div class="product-item">
                        <div>
                            <strong>${p.name}</strong> - <span style="color:var(--primary);">${p.selling_price} ج.م</span>
                            <br>
                            <small style="color:#888;">المخزون: ${p.stock_quantity} | العمولة: ${p.commission} ج.م</small>
                        </div>
                        <button class="btn-danger" onclick="deleteProduct(${p.id})">حذف 🗑️</button>
                    </div>
                `;
            });
        }

        async function saveProduct(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-category').value,
                selling_price: parseFloat(document.getElementById('p-price').value),
                purchasing_price: parseFloat(document.getElementById('p-purchasing').value),
                commission: parseFloat(document.getElementById('p-commission').value),
                stock_quantity: parseInt(document.getElementById('p-stock').value),
                image_url: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value
            };

            const res = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('🎉 تم حفظ وتثبيت المنتج بنجاح!');
                document.getElementById('product-form').reset();
                loadProducts();
            } else {
                alert('❌ فشل حفظ البيانات.');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج نهائياً؟')) return;
            const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
            if (res.ok) { loadProducts(); }
        }

        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
