<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم العليا والأدمن | Sina Store</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #070707; padding: 20px; color:#fff; }
        .section-box { background: #111; border: 1px solid #d4af37; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        th, td { padding:12px; border-bottom:1px solid #222; text-align:right;}
        th { color:#d4af37; }
    </style>
</head>
<body>
    <header style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:15px;">
        <h1 style="color:#d4af37; margin:0;">👑 لوحة الإدارة والتحكم الكاملة</h1>
        <a href="/api/auth/logout" style="color:red; font-weight:bold; text-decoration:none;">🚪 تسجيل خروج</a>
    </header>

    <div class="section-box" style="margin-top:20px;">
        <h2 style="color:#d4af37; margin-top:0;">🤝 طلبات المسوقين المعلقة</h2>
        <table>
            <thead>
                <tr>
                    <th>الاسم الكامل</th>
                    <th>اسم المستخدم</th>
                    <th>الهاتف</th>
                    <th>المحافظة</th>
                    <th>الحالة</th>
                    <th>توليد الكود والتفعيل</th>
                </tr>
            </thead>
            <tbody id="pending-marketers-rows"></tbody>
        </table>
    </div>

    <div class="section-box">
        <h2 style="color:#d4af37; margin-top:0;">📦 إضافة منتج جديد للمخزن السحابي</h2>
        <form id="prod-form" onsubmit="addStoreProduct(event)">
            <div class="grid-2">
                <input type="text" id="p-name" class="search-input" placeholder="اسم المنتج..." required style="width:100%;">
                <input type="text" id="p-cat" class="search-input" placeholder="القسم (عام، جرابات...)" style="width:100%;">
                <input type="number" id="p-purch" class="search-input" placeholder="سعر الشراء (التكلفة)..." required style="width:100%;">
                <input type="number" id="p-sell" class="search-input" placeholder="سعر البيع للجمهور..." required style="width:100%;">
                <input type="number" id="p-comm" class="search-input" placeholder="عمولة المسوق..." required style="width:100%;">
                <input type="number" id="p-stock" class="search-input" placeholder="الكمية المتوفرة بالمخزن..." required style="width:100%;">
                <input type="text" id="p-img" class="search-input" placeholder="رابط صورة المنتج..." style="width:100%; grid-column:span 2;">
                <textarea id="p-desc" class="search-input" placeholder="تفاصيل ووصف المنتج الفني..." style="width:100%; grid-column:span 2; height:80px; background:#1c1c1c; color:#fff; border:1px solid #333; border-radius:8px; padding:10px;"></textarea>
            </div>
            <button type="submit" class="btn-primary" style="margin-top:15px;">تثبيت وحفظ المنتج في قاعدة البيانات ☁️</button>
        </form>
    </div>

    <div class="section-box">
        <h2 style="color:#d4af37; margin-top:0;">📋 إدارة شحنات مبيعات المتجر</h2>
        <table>
            <thead>
                <tr>
                    <th>رقم الشحنة</th>
                    <th>العميل</th>
                    <th>المسوق صاحب الكود</th>
                    <th>الإجمالي الحساب</th>
                    <th>تعديل حالة الشحنة</th>
                </tr>
            </thead>
            <tbody id="admin-orders-rows"></tbody>
        </table>
    </div>

    <script>
        async function loadDashboardData() {
            // جلب المسوقين
            const mRes = await fetch('/api/admin/pending_marketers');
            const marketers = await mRes.json();
            const mTbody = document.getElementById('pending-marketers-rows');
            mTbody.innerHTML = '';
            marketers.forEach(m => {
                mTbody.innerHTML += `
                    <tr>
                        <td>${m.fullname}</td>
                        <td>${m.username}</td>
                        <td>${m.phone}</td>
                        <td>${m.address}</td>
                        <td style="color:${m.status==='approved'?'#22c55e':'orange'}">${m.status==='approved'?'مقبول':'معلق ⏳'}</td>
                        <td>
                            ${m.status==='pending' ? `
                                <input type="text" id="code-${m.id}" placeholder="اكتب كود فريد..." style="padding:6px; border-radius:4px; border:1px solid #d4af37; background:#000; color:#fff;">
                                <button onclick="approveMarketer(${m.id})" style="background:#22c55e; color:#000; padding:6px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">موافقة وتفعيل</button>
                            ` : `<strong>${m.marketer_code}</strong>`}
                        </td>
                    </tr>
                `;
            });

            // جلب الطلبات
            const oRes = await fetch('/api/orders');
            const orders = await oRes.json();
            const oTbody = document.getElementById('admin-orders-rows');
            oTbody.innerHTML = '';
            orders.forEach(o => {
                oTbody.innerHTML += `
                    <tr>
                        <td>#${o.id}</td>
                        <td><strong>${o.customer_name}</strong> (${o.customer_phone})</td>
                        <td><mark style="background:#d4af37; color:#000; padding:2px 6px; border-radius:4px;">${o.marketer_id || 'طبيعي بدون كود'}</mark></td>
                        <td>${o.total_price} ج.م</td>
                        <td>
                            <select onchange="updateStatus(${o.id}, this.value)" style="padding:6px; background:#141414; color:#fff; border:1px solid var(--primary); border-radius:6px;">
                                <option value="قيد المراجعة" ${o.status==='قيد المراجعة'?'selected':''}>قيد المراجعة 🔄</option>
                                <option value="جاري الشحن" ${o.status==='جاري الشحن'?'selected':''}>جاري الشحن 🚚</option>
                                <option value="تم التوصيل" ${o.status==='تم التوصيل'?'selected':''}>تم التوصيل ✅</option>
                                <option value="مسترجع" ${o.status==='مسترجع'?'selected':''}>مسترجع ❌</option>
                            </select>
                        </td>
                    </tr>
                `;
            });
        }

        async function approveMarketer(uid) {
            const codeInput = document.getElementById(`code-${uid}`).value.trim();
            if(!codeInput) { alert("أدخل الكود المخصص للمسوق أولاً!"); return; }
            const res = await fetch('/api/admin/pending_marketers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: uid, marketer_code: codeInput })
            });
            if(res.ok) { alert("🎉 تم اعتماد كود المسوق وتفعيل حسابه سحابياً بنجاح!"); loadDashboardData(); }
        }

        async function addStoreProduct(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value || 'عام',
                purchasing_price: document.getElementById('p-purch').value,
                selling_price: document.getElementById('p-sell').value,
                commission: document.getElementById('p-comm').value,
                stock_quantity: document.getElementById('p-stock').value,
                image_url: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value
            };
            const res = await fetch('/api/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) { alert("📦 تم حفظ وتأمين المنتج بالمخزن بنجاح!"); document.getElementById('prod-form').reset(); loadDashboardData(); }
        }

        async function updateStatus(oid, newStatus) {
            await fetch(`/api/orders/${oid}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: newStatus })
            });
            alert("🚦 تم تحديث حالة الشحنة بالنجاح ومزامنتها فورياً للمسوق والعميل!");
            loadDashboardData();
        }

        window.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
