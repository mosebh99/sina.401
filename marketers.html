<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المسوقين | سينا ستور</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; margin: 0; padding: 20px; color: #f3f4f6; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4af37; padding-bottom: 10px; margin-bottom: 25px; }
        h1 { color: #d4af37; margin: 0; font-size: 22px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 10px; padding: 20px; text-align: center; border-top: 3px solid #d4af37; }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #a3a3a3; }
        .stat-card p { margin: 0; font-size: 24px; font-weight: bold; color: white; }

        h2 { color: #d4af37; font-size: 16px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: #141414; border-radius: 10px; overflow: hidden; border: 1px solid #2a2a2a; font-size: 13px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #2a2a2a; }
        th { background: #1a1a1a; color: #d4af37; }
    </style>
</head>
<body>

    <div class="header">
        <h1>👥 أهلاً بك في نظام التسويق بالعمولة</h1>
        <a href="/" style="background: #262626; color: white; padding: 8px 12px; border-radius: 6px; text-decoration: none; font-size: 12px;">⬅️ المتجر</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>📦 إجمالي المبيعات الناجحة</h3>
            <p id="total-sales-count">0 قطعة</p>
        </div>
        <div class="stat-card">
            <h3>💰 مبيعاتك الإجمالية</h3>
            <p id="total-sales-money" style="color: #22c55e;">0 ج.م</p>
        </div>
        <div class="stat-card">
            <h3>🎁 أرباحك وعمولتك (10%)</h3>
            <p id="total-commission" style="color: #d4af37;">0 ج.م</p>
        </div>
    </div>

    <h2>📋 قائمة طلبات عملائك وحالة شحنها:</h2>
    <table>
        <thead>
            <tr>
                <th>رقم الطلب</th>
                <th>اسم العميل</th>
                <th>المنتج</th>
                <th>قيمة الطلب</th>
                <th>حالة الشحن الحالية</th>
            </tr>
        </thead>
        <tbody id="marketer-table-body">
            </tbody>
    </table>

    <script>
        // محاكاة لمعرف المسوق الحالي المسجل دخوله
        const currentMarketerId = "marketer_ahmed"; 

        function loadMarketerReport() {
            fetch('/api/admin/orders')
            .then(res => res.json())
            .then(orders => {
                // تصفية الطلبات الخاصة بهذا المسوق فقط لحفظ الخصوصية
                const myOrders = orders.filter(o => o.marketer_id === currentMarketerId);
                
                let totalPieces = 0;
                let totalMoney = 0;
                
                const tbody = document.getElementById('marketer-table-body');
                tbody.innerHTML = myOrders.length === 0 ? '<tr><td colspan="5" style="text-align:center; color:#a3a3a3;">لم تقم ببيع أي منتجات حتى الآن. بدأ التسويق الآن!</td></tr>' : '';

                myOrders.forEach(order => {
                    if(order.status === "تم التوصيل") {
                        totalPieces += order.quantity;
                        totalMoney += order.total;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td>#${order.order_id}</td>
                            <td>${order.customer_name}</td>
                            <td>${order.product_name} (x${order.quantity})</td>
                            <td>${order.total} ج.م</td>
                            <td style="font-weight:bold; color: #eab308;">🔄 ${order.status}</td>
                        </tr>
                    `;
                });

                // تحديث العدادات الفورية في الكروت فوق
                document.getElementById('total-sales-count').innerText = `${totalPieces} قطعة`;
                document.getElementById('total-sales-money').innerText = `${totalMoney} ج.م`;
                document.getElementById('total-commission').innerText = `${Math.round(totalMoney * 0.1)} ج.م`; // العمولة الافتراضية 10%
            });
        }

        loadMarketerReport();
    </script>
</body>
</html>
