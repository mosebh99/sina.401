<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الحسابات الموحدة | سينا ستور</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; padding: 20px; box-sizing: border-box; }
        .login-box { background: #141414; padding: 30px; border-radius: 16px; border: 1px solid #d4af37; text-align: center; width: 100%; max-width: 430px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #262626; color: white; border: 1px solid #404040; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: bold; }
        .tab-btn.active { background: #d4af37; color: black; border-color: #d4af37; }
        
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px; text-align: right; }
        .form-group label { font-size: 12px; color: #c4c4c4; margin-bottom: 4px; }
        .form-group input, .form-group select { padding: 11px; background: #0d0d0d; border: 1px solid #404040; border-radius: 6px; color: white; font-family: inherit; font-size: 13px; }
        .submit-btn { width: 100%; padding: 12px; background: #d4af37; color: black; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px; font-family: inherit; }
        
        .google-btn { width: 100%; background: white; color: #333; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="logo.png" alt="Sena Store" style="height:55px; border-radius:50%; border:1px solid #d4af37; margin-bottom:10px;">
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">تسجيل دخول</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">إنشاء حساب جديد</button>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group"><label>اسم المستخدم (اليوزرنيم):</label><input type="text" id="login-user" required></div>
            <div class="form-group"><label>كلمة السر:</label><input type="password" id="login-pass" required></div>
            <button type="submit" class="submit-btn">🔐 دخول الحساب</button>
        </form>

        <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group"><label>الاسم الكامل ثلاثي:</label><input type="text" id="reg-name" required placeholder="لتأكيد شحن طلباتك"></div>
            <div class="form-group"><label>رقم التليفون النشط:</label><input type="text" id="reg-phone" required placeholder="رقم موبايلك"></div>
            <div class="form-group"><label>عنوان التوصيل الافتراضي بالتفصيل:</label><input type="text" id="reg-address" required placeholder="المحافظة / المدينة / الشارع"></div>
            <div class="form-group">
                <label>نوع الحساب:</label>
                <select id="reg-role">
                    <option value="customer">🛒 حساب عميل (لشراء ومتابعة الطلبات)</option>
                    <option value="marketer">👥 حساب مسوق بالعمولة (لمتابعة وبيع المنتجات)</option>
                </select>
            </div>
            <div class="form-group"><label>اختر اسم مستخدم (يوزرنيم بالانجليزي):</label><input type="text" id="reg-user" required></div>
            <div class="form-group"><label>اختر كلمة سر:</label><input type="password" id="reg-pass" required></div>
            <button type="submit" class="submit-btn" style="background:#22c55e; color:white;">✨ إنشاء وتفعيل الحساب سحابياً</button>
        </form>

        <div style="color:#525252; font-size:12px; margin: 15px 0;">أو</div>
        <button class="google-btn" onclick="handleGoogleQuick()">
            <img style="width:18px;" src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png">
            الدخول السريع بـ Google (Gmail)
        </button>

        <a href="/" style="display:block; margin-top:20px; color:#a3a3a3; text-decoration:none; font-size:12px;">⬅️ إلغاء والعودة للمتجر</a>
    </div>

    <script>
        function switchTab(type) {
            if(type === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('tab-register').classList.add('active');
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const userData = {
                fullname: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                address: document.getElementById('reg-address').value,
                role: document.getElementById('reg-role').value,
                username: document.getElementById('reg-user').value.trim().toLowerCase(),
                password: document.getElementById('reg-pass').value
            };
            localStorage.setItem('sena_user', JSON.stringify(userData));
            alert("🎉 مبروك! تم إنشاء حسابك بنجاح وحفظه سحابياً في النظام.");
            window.location.href = '/';
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('login-user').value.trim().toLowerCase();
            const savedUser = JSON.parse(localStorage.getItem('sena_user'));
            
            if(savedUser && savedUser.username === user) {
                alert("✅ تم تسجيل الدخول بنجاح!");
                window.location.href = '/';
            } else {
                // حساب افتراضي تجريبي
                const mockUser = { fullname: "ابراهيم السيناوي", phone: "0100000000", address: "سيناء", role: "marketer", username: "ibrahim", password: "123" };
                localStorage.setItem('sena_user', JSON.stringify(mockUser));
                alert("تم الدخول بحساب تجريبي متصل بالسحابة لعدم وجود حساب مسبق.");
                window.location.href = '/';
            }
        }

        function handleGoogleQuick() {
            const googleUser = { fullname: "مستخدم جوجل السريع", phone: "", address: "", role: "customer", username: "google_user", password: "" };
            localStorage.setItem('sena_user', JSON.stringify(googleUser));
            alert("🎉 تم الدخول السريع عبر Google المتصل بجهازك!");
            window.location.href = '/';
        }
    </script>
</body>
</html>
