<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول الموحد | سينا ستور</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; padding: 15px; box-sizing: border-box; }
        .login-box { background: #141414; padding: 30px; border-radius: 16px; border: 1px solid #d4af37; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .login-box img { height: 60px; width: 60px; border-radius: 50%; border: 1px solid #d4af37; margin-bottom: 15px; }
        h2 { margin: 0 0 8px 0; color: #d4af37; font-size: 20px; }
        p { color: #a3a3a3; font-size: 13px; margin: 0 0 20px 0; }
        
        /* زرار جوجل */
        .google-btn { width: 100%; background: white; color: #333; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-family: inherit; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .google-btn:hover { background: #f3f4f6; }
        .google-icon { width: 18px; height: 18px; }
        
        .divider { display: flex; align-items: center; text-align: center; color: #525252; font-size: 12px; margin-bottom: 20px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #2a2a2a; }
        .divider:not(:empty)::before { margin-left: .25em; }
        .divider:not(:empty)::after { margin-right: .25em; }

        /* الفورم اليدوي */
        .manual-form { text-align: right; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .form-group label { font-size: 12px; color: #c4c4c4; margin-bottom: 4px; }
        .form-group input { padding: 11px; background: #0d0d0d; border: 1px solid #404040; border-radius: 6px; color: white; text-align: right; font-family: inherit; font-size: 13px; }
        .form-group input:focus { border-color: #d4af37; outline: none; }
        .submit-manual-btn { width: 100%; padding: 12px; background: #d4af37; color: black; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 5px; }

        .footer-link { display: block; margin-top: 20px; color: #a3a3a3; text-decoration: none; font-size: 12px; }
        .footer-link:hover { color: #d4af37; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="logo.png" alt="Sena Store">
        <h2>تسجيل الدخول للمتجر</h2>
        <p>سجل دخولك بالطريقة الأسهل لك لمتابعة الحساب والطلبات.</p>
        
        <button class="google-btn" onclick="handleGoogleLogin()">
            <img class="google-icon" src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google">
            الدخول السريع بحساب Google
        </button>

        <div class="divider">أو الدخول اليدوي (للمسوقين والإدارة)</div>

        <form class="manual-form" onsubmit="handleManualLogin(event)">
            <div class="form-group">
                <label>اسم المستخدم أو البريد:</label>
                <input type="text" id="username" required placeholder="اكتب اسم حسابك">
            </div>
            <div class="form-group">
                <label>كلمة السر:</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="submit-manual-btn">تسجيل دخول يدوي 🔐</button>
        </form>

        <a href="/" class="footer-link">⬅️ إلغاء والعودة للمتجر</a>
    </div>

    <script>
        function handleGoogleLogin() {
            localStorage.setItem('user_logged_in', 'true');
            alert("🎉 تم تسجيل الدخول التلقائي بنجاح عبر حساب Google المتصل بجهازك!");
            window.location.href = '/';
        }

        function handleManualLogin(e) {
            e.preventDefault();
            localStorage.setItem('user_logged_in', 'true');
            alert("✅ تم تسجيل الدخول اليدوي بنجاح!");
            window.location.href = '/';
        }
    </script>
</body>
</html>
