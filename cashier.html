<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Sina Store</title>
    <link rel="icon" type="image/png" href="logo.png.jpeg">
    <style>
        :root { --primary: #d4af37; --bg: #0d0d0d; --card-bg: #141414; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1, h2 { color: var(--primary); text-align: center; }
        .form-box { background: var(--card-bg); border: 1px solid var(--primary); padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--primary); font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }
        .submit-btn { background: var(--primary); color: black; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: #b8962e; }
        .product-item { background: #1a1a1a; padding: 12px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a2a2a; }
        .delete-btn { background: #dc2626; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>👑 لوحة تحكم سينا ستور</h1>
        <p style="text-align: center;"><a href="/" style="color: var(--primary); text-decoration: none;">⬅️ العودة للمتجر الرئيسي</a></p>

        <div class="form-box">
            <h2>✨ إضافة منتج جديد للمخزن السحابي</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="p-name" required placeholder="مثال: زيت زيتون سيناوي بكر">
                </div>
                <div class="form-group">
                    <label>القسم *</label>
                    <select id="p-cat">
                        <option value="زيوت طبيعية">زيوت طبيعية 🫒</option>
                        <option value="أعشاب طبيعية">أعشاب سيناوية 🌱</option>
                        <option value="عسل">عسل طبيعي 🍯</option>
                        <option value="عام">عام 🌿</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>سعر البيع للجمهور (ج.م) *</label>
                    <input type="number" id="p-selling" required placeholder="السعر اللي هيظهر للزبون">
                </div>
                <div class="form-group">
                    <label>سعر الجملة / التكلفة (ج.م)</label>
                    <input type="number" id="p-purchasing" value="0">
                </div>
                <div class="form-group">
                    <label>عمولة المسوق (ج.م)</label>
                    <input type="number" id="p-comm" value="0">
                </div>
                <div class="form-group">
                    <label>الكمية في المخزن</label>
                    <input type="number" id="p-stock" value="100">
                </div>
                <div class="form-group">
                    <label>رابط صورة المنتج (أو اتركها فارغة للوجو الافتراضي)</label>
                    <input type="text" id="p-img" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>وصف المنتج</label>
                    <textarea id="p-desc" rows="3" placeholder="اكتب تفاصيل ومميزات المنتج هنا..."></textarea>
                </div>
                <button type="submit" class="submit-btn">🚀 نشر وتثبيت المنتج في المتجر</button>
            </form>
        </div>

        <div class="form-box">
            <h2>📦 المنتجات الحالية بالمخزن</h2>
            <div id="products-list">جاري تحميل المخزن السحابي...</div>
        </div>
    </div>

    <script>
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const list = await res.json();
                const container = document.getElementById('products-list');
                container.innerHTML = '';
                
                if (list.length === 0) {
                    container.innerHTML = '<p style="color:#666; text-align:center;">المخزن فارغ حالياً.</p>';
                    return;
                }
                
                list.forEach(p => {
                    container.innerHTML += `
                        <div class="product-item">
                            <div>
                                <strong>${p.name}</strong> - <span style="color:var(--primary)">${p.selling_price} ج.م</span>
                                <br><small style="color:#888;">القسم: ${p.category}</small>
                            </div>
                            <button class="delete-btn" onclick="deleteProduct(${p.id})">حذف ❌</button>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('products-list').innerText = 'خطأ في جلب المنتجات.';
            }
        }

        async function saveProduct(e) {
            e.preventDefault();
            
            // تجميع البيانات بالأسماء الصحيحة التي يتوقعها السيرفر بالملّي
            const payload = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                selling_price: parseFloat(document.getElementById('p-selling').value),
                purchasing_price: parseFloat(document.getElementById('p-purchasing').value),
                commission: parseFloat(document.getElementById('p-comm').value),
                stock_quantity: parseInt(document.getElementById('p-stock').value),
                image_url: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value
            };

            try {
                const res = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert('🎉 تم حفظ المنتج وتثبيته في سوبابيس بنجاح!');
                    document.getElementById('product-form').reset();
                    loadProducts(); // تحديث القائمة
                } else {
                    const errData = await res.json();
                    alert('❌ فشل إضافة المنتج: ' + (errData.message || 'خطأ غير معروف'));
                }
            } catch (error) {
                alert('❌ حدث خطأ في الاتصال بالسيرفر.');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج نهائياً؟')) return;
            try {
                const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('✅ تم حذف المنتج بنجاح.');
                    loadProducts();
                }
            } catch (e) {
                alert('خطأ في الحذف.');
            }
        }

        // تشغيل الجلب عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
