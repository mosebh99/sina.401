<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة | سينا ستور</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; color: white; margin: 0; padding: 20px; box-sizing: border-box; }
        h1, h2 { color: #d4af37; border-bottom: 1px solid #2a2a2a; padding-bottom: 10px; }
        
        /* نظام الحماية */
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d0d0d; z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background:#141414; border: 2px solid #d4af37; border-radius:16px; padding:30px; width:100%; max-width:400px; text-align:center; }
        
        .admin-container { max-width: 1200px; margin: 0 auto; display: none; }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .grid-layout { grid-template-columns: 350px 1fr; } }
        
        .card { background: #141414; border: 1px solid #333; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); height: fit-content; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px; text-align: right; }
        .form-group label { font-size: 12px; color: #a3a3a3; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { padding: 10px; background: #080808; border: 1px solid #444; border-radius: 6px; color: white; font-family: inherit; text-align: right; }
        
        .submit-btn { width: 100%; padding: 12px; background: #22c55e; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .cancel-btn { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 5px; display: none; }

        /* جدول المنتجات */
        .product-item { display: flex; align-items: center; gap: 15px; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2a2a2a; }
        .product-item img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .product-info { flex-grow: 1; }
        .product-info h4 { margin: 0; font-size: 14px; color: #d4af37; }
        .product-info span { font-size: 12px; color: #a3a3a3; }
        .btn-group { display: flex; gap: 5px; }
        .btn-edit { background: #d4af37; color: black; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-delete { background: #dc2626; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        .file-box { border: 1px dashed #d4af37; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; margin-bottom: 10px; }
        #preview { max-width: 100px; margin-top: 10px; border-radius: 4px; display: none; margin-inline: auto; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color:#d4af37;">🔐 دخول المدير</h2>
            <input type="password" id="pass-field" placeholder="كلمة السر" style="width:100%; padding:12px; margin-bottom:15px; background:#000; border:1px solid #d4af37; color:white; text-align:center; border-radius:8px;">
            <button onclick="checkPass()" class="submit-btn">فتح اللوحة</button>
        </div>
    </div>

    <div class="admin-container" id="admin-page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>👑 الإدارة الشاملة للمتجر</h1>
            <a href="/" style="color:#d4af37; text-decoration:none;">⬅️ المتجر</a>
        </div>

        <div class="grid-layout">
            <div class="card">
                <h2 id="form-title">➕ إضافة منتج جديد</h2>
                <form id="product-form" onsubmit="saveProduct(event)">
                    <input type="hidden" id="edit-id">
                    <div class="form-group"><label>اسم المنتج:</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>السعر (ج.م):</label><input type="number" id="price" required></div>
                    <div class="form-group"><label>الكمية:</label><input type="number" id="stock" required></div>
                    <div class="form-group">
                        <label>صورة المنتج:</label>
                        <div class="file-box" onclick="document.getElementById('file').click()">
                            <span id="file-status">📸 اختر صورة</span>
                            <input type="file" id="file" accept="image/*" style="display:none;" onchange="compressImg(event)">
                            <img id="preview">
                        </div>
                    </div>
                    <div class="form-group"><label>وصف المنتج:</label><textarea id="desc" rows="3" required></textarea></div>
                    
                    <button type="submit" class="submit-btn" id="save-btn">نشر المنتج سحابياً</button>
                    <button type="button" class="cancel-btn" id="cancel-btn" onclick="resetForm()">إلغاء التعديل</button>
                </form>
            </div>

            <div class="card">
                <h2>📦 إدارة المخزن (تعديل / مسح)</h2>
                <div id="product-list">
                    <p style="color:#666;">جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "010656534";
        let products = [];
        let currentImgBase64 = "logo.png";

        function checkPass() {
            if(document.getElementById('pass-field').value === ADMIN_PASS) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('admin-page').style.display = 'block';
                loadProducts();
            } else { alert("خطأ في كلمة السر!"); }
        }

        // ضغط الصورة من الموبايل
        function compressImg(e) {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('file-status').innerText = "⏳ جاري المعالجة...";
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const scale = 500 / img.width;
                    canvas.width = 500;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('preview').src = currentImgBase64;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('file-status').innerText = "✅ تم الضغط";
                }
            };
            reader.readAsDataURL(file);
        }

        async function loadProducts() {
            const res = await fetch('/api/products');
            products = await res.json();
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            products.forEach(p => {
                list.innerHTML += `
                    <div class="product-item">
                        <img src="${p.image_url}" onerror="this.src='logo.png'">
                        <div class="product-info">
                            <h4>${p.name}</h4>
                            <span>السعر: ${p.selling_price} ج.م | مخزن: ${p.stock_quantity}</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-edit" onclick="editProduct(${p.id})">تعديل</button>
                            <button class="btn-delete" onclick="deleteProduct(${p.id})">مسح</button>
                        </div>
                    </div>
                `;
            });
        }

        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('name').value,
                selling_price: document.getElementById('price').value,
                stock_quantity: document.getElementById('stock').value,
                description: document.getElementById('desc').value,
                image_url: currentImgBase64
            };

            const url = id ? `/api/products/${id}` : '/api/products';
            const method = id ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            alert("تم الحفظ سحابياً بنجاح!");
            resetForm();
            loadProducts();
        }

        async function deleteProduct(id) {
            if(confirm("هل أنت متأكد من مسح هذا المنتج نهائياً؟")) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('form-title').innerText = "📝 تعديل منتج";
            document.getElementById('edit-id').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('price').value = p.selling_price;
            document.getElementById('stock').value = p.stock_quantity;
            document.getElementById('desc').value = p.description;
            document.getElementById('save-btn').innerText = "حفظ التغييرات";
            document.getElementById('cancel-btn').style.display = 'block';
            window.scrollTo(0,0);
        }

        function resetForm() {
            document.getElementById('product-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "➕ إضافة منتج جديد";
            document.getElementById('save-btn').innerText = "نشر المنتج سحابياً";
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('preview').style.display = 'none';
            currentImgBase64 = "logo.png";
        }
    </script>
</body>
</html>
