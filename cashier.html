<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والكاشير | سينا ستور</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0d; margin: 0; padding: 20px; color: #f3f4f6; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4af37; padding-bottom: 10px; margin-bottom: 30px; }
        h1 { color: #d4af37; margin: 0; font-size: 24px; }
        .back-btn { background: #262626; color: white; border: 1px solid #404040; padding: 8px 15px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 13px; }
        
        .table-container { background: #141414; border-radius: 12px; border: 1px solid #2a2a2a; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 14px; }
        th, td { padding: 14px; border-bottom: 1px solid #2a2a2a; }
        th { background: #1a1a1a; color: #d4af37; font-weight: bold; }
        tr:hover { background: #1c1c1c; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .status-requested { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .status-shipping { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid #eab308; }
        .status-delivered { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #ef6868; border: 1px solid #ef6868; }
        
        .actions-cell { display: flex; gap: 8px; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .btn-ship { background: #eab308; color: black; }
        .btn-deliver { background: #22c55e; color: white; }
        .btn-cancel { background: #ef6868; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🖥️ لوحة تحكم الإدارة والكاشير</h1>
        <a href="/" class="back-btn">⬅️ العودة للمتجر</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>رقم الطلب</th>
                    <th>اسم الزبون</th>
                    <th>رقم التليفون</th>
                    <th>العنوان بالتفصيل</th>
                    <th>المنتج المطلوب</th>
                    <th>الإجمالي</th>
                    <th>حالة الشحن</th>
                    <th>إجراءات التحكم</th>
                </tr>
            </thead>
            <tbody id="orders-table-body">
                </tbody>
        </table>
    </div>

    <script>
        function fetchOrders() {
            fetch('/api/admin/orders')
            .then(res => res.json())
            .then(orders => {
                const tbody = document.getElementById('orders-table-body');
                tbody.innerHTML = '';
                
                if(orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#a3a3a3;">لا توجد طلبات مسجلة حالياً.</td></tr>';
                    return;
                }
                
                orders.forEach(order => {
                    let statusClass = "status-requested";
                    if(order.status === "جاري الشحن") statusClass = "status-shipping";
                    if(order.status === "تم التوصيل") statusClass = "status-delivered";
                    if(order.status === "ملغي") statusClass = "status-cancelled";

                    tbody.innerHTML += `
                        <tr>
                            <td>#${order.order_id}</td>
                            <td><b>${order.customer_name}</b></td>
                            <td>${order.customer_phone}</td>
                            <td>${order.customer_address}</td>
                            <td>${order.product_name} (x${order.quantity})</td>
                            <td style="color:#d4af37; font-weight:bold;">${order.total} ج.م</td>
                            <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                            <td class="actions-cell">
                                <button class="action-btn btn-ship" onclick="updateStatus(${order.order_id}, 'جاري الشحن')">🚚 شحن</button>
                                <button class="action-btn btn-deliver" onclick="updateStatus(${order.order_id}, 'تم التوصيل')">✅ توصيل</button>
                                <button class="action-btn btn-cancel" onclick="updateStatus(${order.order_id}, 'ملغي')">❌ إلغاء</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function updateStatus(orderId, newStatus) {
            fetch('/api/admin/orders/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId, status: newStatus })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    fetchOrders(); // إعادة تحميل الجدول بعد التحديث لتحديث الحالة أمام العميل أيضاً
                }
            });
        }

        // تحميل البيانات عند فتح الصفحة
        fetchOrders();
    </script>
</body>
</html>
